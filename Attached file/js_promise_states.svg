<svg width="860" height="420" viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="par" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
    <marker id="pred" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#B83227"/></marker>
    <marker id="pgrn" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#2E8B6B"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="420" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">Promise 상태 전이 — pending → fulfilled / rejected</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">executor가 resolve(value) 또는 reject(error)를 호출하면 상태가 한 번 확정(settled)되며, 이후에는 절대 바뀌지 않는다.</text>

  <!-- new Promise -->
  <rect x="40" y="150" width="150" height="56" rx="10" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="115" y="176" font-size="13" font-weight="700" fill="#8A5E12" text-anchor="middle">new Promise</text>
  <text x="115" y="195" font-size="10.5" fill="#8A9BA8" text-anchor="middle">executor 즉시 실행</text>

  <line x1="190" y1="178" x2="238" y2="178" stroke="#08748C" stroke-width="1.6" marker-end="url(#par)"/>

  <!-- pending -->
  <rect x="240" y="146" width="180" height="64" rx="10" fill="#EAF4F6" stroke="#08748C" stroke-width="1.8"/>
  <text x="330" y="172" font-size="14" font-weight="700" fill="#065A6E" text-anchor="middle">pending (대기)</text>
  <text x="330" y="192" font-size="10.5" fill="#8A9BA8" text-anchor="middle">state: pending · result: undefined</text>

  <!-- fulfilled -->
  <rect x="600" y="80" width="220" height="70" rx="10" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.8"/>
  <text x="710" y="106" font-size="14" font-weight="700" fill="#1F6B4E" text-anchor="middle">fulfilled (이행)</text>
  <text x="710" y="126" font-size="10.5" fill="#5A6B78" text-anchor="middle">state: fulfilled · result: value</text>
  <text x="710" y="141" font-size="10" fill="#8A9BA8" text-anchor="middle">.then(onFulfilled) 실행</text>

  <!-- rejected -->
  <rect x="600" y="206" width="220" height="70" rx="10" fill="#FCF5F4" stroke="#B83227" stroke-width="1.8"/>
  <text x="710" y="232" font-size="14" font-weight="700" fill="#B83227" text-anchor="middle">rejected (거부)</text>
  <text x="710" y="252" font-size="10.5" fill="#5A6B78" text-anchor="middle">state: rejected · result: error</text>
  <text x="710" y="267" font-size="10" fill="#8A9BA8" text-anchor="middle">.catch(onRejected) 실행</text>

  <!-- resolve arrow -->
  <path d="M420 168 C 500 140, 540 120, 598 112" fill="none" stroke="#2E8B6B" stroke-width="1.8" marker-end="url(#pgrn)"/>
  <text x="500" y="126" font-size="11.5" font-weight="700" fill="#2E8B6B">resolve(value)</text>

  <!-- reject arrow -->
  <path d="M420 190 C 500 220, 540 232, 598 240" fill="none" stroke="#B83227" stroke-width="1.8" marker-end="url(#pred)"/>
  <text x="500" y="238" font-size="11.5" font-weight="700" fill="#B83227">reject(error)</text>

  <!-- settled bracket -->
  <path d="M846 80 q10 0 10 10 v176 q0 10 -10 10" fill="none" stroke="#8A9BA8" stroke-width="1.3"/>
  <text x="852" y="182" font-size="11" fill="#8A9BA8" transform="rotate(90 852 182)" text-anchor="middle">settled (확정, 불변)</text>

  <text x="40" y="330" font-size="11.5" fill="#8A9BA8">· resolve/reject 중 먼저 호출된 하나만 유효하고, 이후 호출은 모두 무시된다 (상태는 단 한 번만 확정).</text>
  <text x="40" y="352" font-size="11.5" fill="#8A9BA8">· pending 상태에서만 전이가 가능하며, 한 번 settled 되면 state·result가 영구히 고정된다.</text>
  <text x="40" y="374" font-size="11.5" fill="#8A9BA8">· 이미 settled 된 프라미스에 .then/.catch를 붙여도 등록된 콜백은 정상적으로 (비동기로) 호출된다.</text>
</svg>
