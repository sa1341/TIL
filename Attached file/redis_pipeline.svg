<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="par" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8A9BA8"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="340" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">Redis 파이프라인 — 병목은 Redis가 아니라 왕복</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">명령은 마이크로초, 네트워크 왕복(RTT)은 1~3ms. 1000번 왕복하면 수 초</text>

  <!-- without pipeline -->
  <rect x="32" y="90" width="390" height="150" rx="12" fill="#FCF5F4" stroke="#B83227" stroke-width="1.4"/>
  <text x="227" y="114" font-size="13" font-weight="700" fill="#B83227" text-anchor="middle">파이프라인 없음 — 1000번 왕복</text>
  <text x="70" y="150" font-size="10" fill="#5A6B78">앱</text><text x="384" y="150" font-size="10" fill="#5A6B78">Redis</text>
  <line x1="90" y1="146" x2="366" y2="146" stroke="#8A9BA8" stroke-width="1" marker-end="url(#par)"/>
  <line x1="366" y1="160" x2="90" y2="160" stroke="#8A9BA8" stroke-width="1" marker-end="url(#par)"/>
  <line x1="90" y1="174" x2="366" y2="174" stroke="#8A9BA8" stroke-width="1" marker-end="url(#par)"/>
  <line x1="366" y1="188" x2="90" y2="188" stroke="#8A9BA8" stroke-width="1" marker-end="url(#par)"/>
  <text x="227" y="210" font-size="10.5" fill="#8A9BA8" text-anchor="middle">… × 1000 (요청마다 대기)</text>
  <text x="227" y="230" font-size="11.5" font-weight="700" fill="#B83227" text-anchor="middle">API 3초</text>

  <!-- with pipeline -->
  <rect x="438" y="90" width="390" height="150" rx="12" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.4"/>
  <text x="633" y="114" font-size="13" font-weight="700" fill="#1F6B4E" text-anchor="middle">파이프라인 — 왕복 1번</text>
  <text x="476" y="150" font-size="10" fill="#5A6B78">앱</text><text x="790" y="150" font-size="10" fill="#5A6B78">Redis</text>
  <line x1="496" y1="152" x2="772" y2="152" stroke="#2E8B6B" stroke-width="2.5" marker-end="url(#par)"/>
  <text x="634" y="146" font-size="9.5" fill="#1F6B4E" text-anchor="middle">1000개 명령 한 번에</text>
  <line x1="772" y1="176" x2="496" y2="176" stroke="#2E8B6B" stroke-width="2.5" marker-end="url(#par)"/>
  <text x="634" y="192" font-size="9.5" fill="#1F6B4E" text-anchor="middle">1000개 응답 한 번에</text>
  <text x="633" y="230" font-size="11.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">50ms 이내 (수십 배 ↓)</text>

  <text x="32" y="278" font-size="11.5" fill="#8A9BA8">주의: 응답이 한꺼번에 메모리에 쌓임 → 대량은 500~1000개 단위로 끊기. 원자성 필요하면 MULTI/EXEC·Lua.</text>
  <text x="32" y="302" font-size="11.5" fill="#8A9BA8">Redis가 느리다면 Redis가 아니라 네트워크를 의심하라.</text>
</svg>
