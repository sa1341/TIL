<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="jar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#8A9BA8"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="320" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">JSON 주석 제거 — 순수성 vs 생태계 파편화</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">크락포드가 주석을 의도적으로 제거(파싱 지시문화 방지) → 사람 편의를 희생</text>

  <rect x="320" y="90" width="220" height="50" rx="10" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="430" y="112" font-size="13" font-weight="700" fill="#065A6E" text-anchor="middle">JSON (주석 없음)</text>
  <text x="430" y="130" font-size="10" fill="#8A9BA8" text-anchor="middle">"데이터 교환 포맷, 문서가 아니다"</text>

  <line x1="430" y1="140" x2="200" y2="176" stroke="#8A9BA8" stroke-width="1.2" marker-end="url(#jar)"/>
  <line x1="430" y1="140" x2="430" y2="176" stroke="#8A9BA8" stroke-width="1.2" marker-end="url(#jar)"/>
  <line x1="430" y1="140" x2="660" y2="176" stroke="#8A9BA8" stroke-width="1.2" marker-end="url(#jar)"/>
  <text x="430" y="164" font-size="10" fill="#B83227" text-anchor="middle">개발자들이 참지 못함 → 파생 포맷 5+개</text>

  <rect x="90" y="182" width="200" height="40" rx="8" fill="#FBF3E4" stroke="#C88A2E"/><text x="190" y="207" font-size="11" fill="#8A5E12" text-anchor="middle">JSON5</text>
  <rect x="330" y="182" width="200" height="40" rx="8" fill="#FBF3E4" stroke="#C88A2E"/><text x="430" y="207" font-size="11" fill="#8A5E12" text-anchor="middle">JSONC (주석 허용)</text>
  <rect x="570" y="182" width="200" height="40" rx="8" fill="#FBF3E4" stroke="#C88A2E"/><text x="670" y="207" font-size="11" fill="#8A5E12" text-anchor="middle">HJSON …</text>

  <rect x="40" y="242" width="780" height="46" rx="8" fill="#FCF5F4" stroke="#E0B4AD"/>
  <text x="56" y="264" font-size="11.5" font-weight="700" fill="#B83227">같은 .json 확장자, 다른 규칙</text>
  <text x="56" y="282" font-size="10.8" fill="#5A6B78">tsconfig.json = 사실 JSONC(주석 허용) · package.json = 진짜 JSON → 주석 하나의 부재가 만든 나비 효과</text>
</svg>
