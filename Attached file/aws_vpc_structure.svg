<svg width="860" height="460" viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="vpar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="460" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">AWS VPC 구조 — 리전 · AZ · 서브넷</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">VPC(사설 네트워크) 안에 AZ별로 서브넷을 두고, 퍼블릭 서브넷만 IGW를 통해 인터넷과 연결</text>

  <!-- internet + IGW -->
  <rect x="360" y="86" width="140" height="34" rx="17" fill="#F4F6F7" stroke="#8A9BA8"/>
  <text x="430" y="108" font-size="12.5" fill="#5A6B78" text-anchor="middle" font-weight="700">인터넷</text>
  <line x1="430" y1="120" x2="430" y2="150" stroke="#08748C" stroke-width="1.6" marker-end="url(#vpar)"/>
  <rect x="380" y="150" width="100" height="30" rx="6" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="430" y="170" font-size="11.5" fill="#8A5E12" text-anchor="middle" font-weight="700">IGW</text>

  <!-- VPC box -->
  <rect x="40" y="196" width="780" height="230" rx="12" fill="#EAF4F6" stroke="#08748C" stroke-width="1.8"/>
  <text x="60" y="222" font-size="14.5" font-weight="700" fill="#065A6E">VPC (리전에 종속) · CIDR 10.0.0.0/16</text>

  <!-- AZ-a -->
  <rect x="66" y="236" width="360" height="176" rx="10" fill="#ffffff" stroke="#B7D5DC" stroke-dasharray="5,3"/>
  <text x="86" y="258" font-size="12.5" font-weight="700" fill="#3E5060">가용영역 A (AZ-a)</text>
  <rect x="86" y="270" width="320" height="58" rx="8" fill="#DFF0E8" stroke="#2E8B6B"/>
  <text x="98" y="290" font-size="11.5" font-weight="700" fill="#1F6B4E">퍼블릭 서브넷 10.0.1.0/24</text>
  <rect x="98" y="298" width="90" height="22" rx="4" fill="#ffffff" stroke="#2E8B6B"/><text x="143" y="313" font-size="10.5" fill="#1F6B4E" text-anchor="middle">EC2 (웹)</text>
  <rect x="86" y="336" width="320" height="60" rx="8" fill="#FCF5F4" stroke="#B83227"/>
  <text x="98" y="356" font-size="11.5" font-weight="700" fill="#B83227">프라이빗 서브넷 10.0.2.0/24</text>
  <rect x="98" y="364" width="90" height="22" rx="4" fill="#ffffff" stroke="#B83227"/><text x="143" y="379" font-size="10.5" fill="#B83227" text-anchor="middle">RDS (DB)</text>

  <!-- AZ-c -->
  <rect x="440" y="236" width="360" height="176" rx="10" fill="#ffffff" stroke="#B7D5DC" stroke-dasharray="5,3"/>
  <text x="460" y="258" font-size="12.5" font-weight="700" fill="#3E5060">가용영역 C (AZ-c)</text>
  <rect x="460" y="270" width="320" height="58" rx="8" fill="#DFF0E8" stroke="#2E8B6B"/>
  <text x="472" y="290" font-size="11.5" font-weight="700" fill="#1F6B4E">퍼블릭 서브넷 10.0.3.0/24</text>
  <rect x="472" y="298" width="90" height="22" rx="4" fill="#ffffff" stroke="#2E8B6B"/><text x="517" y="313" font-size="10.5" fill="#1F6B4E" text-anchor="middle">EC2 (웹)</text>
  <rect x="460" y="336" width="320" height="60" rx="8" fill="#FCF5F4" stroke="#B83227"/>
  <text x="472" y="356" font-size="11.5" font-weight="700" fill="#B83227">프라이빗 서브넷 10.0.4.0/24</text>
  <rect x="472" y="364" width="90" height="22" rx="4" fill="#ffffff" stroke="#B83227"/><text x="517" y="379" font-size="10.5" fill="#B83227" text-anchor="middle">RDS (DB)</text>

  <text x="600" y="313" font-size="10" fill="#8A9BA8">SG = 인스턴스 방화벽</text>
  <text x="600" y="379" font-size="10" fill="#8A9BA8">NACL = 서브넷 방화벽</text>
  <text x="430" y="446" font-size="11.5" fill="#8A9BA8" text-anchor="middle">퍼블릭 서브넷은 라우팅 테이블이 IGW를 향함 · 프라이빗 서브넷은 인터넷 직접 연결 없음</text>
</svg>
