<svg width="860" height="400" viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="lar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#B83227"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">새벽 502의 정체 — LB와 서버의 Keep-Alive 타임아웃 불일치</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">서버가 먼저 끊은 커넥션에 LB가 요청을 보내는 경쟁 상태(Race Condition)</text>

  <!-- timeline bars -->
  <text x="40" y="108" font-size="12" font-weight="700" fill="#3E5060">타임라인 (유휴 커넥션)</text>

  <text x="40" y="150" font-size="12" fill="#065A6E">LB (ALB idle 60초)</text>
  <rect x="200" y="136" width="560" height="24" rx="4" fill="#EAF4F6" stroke="#08748C"/>
  <text x="480" y="153" font-size="10.5" fill="#065A6E" text-anchor="middle">이 커넥션 아직 살아있다고 판단 (60초까지)</text>

  <text x="40" y="200" font-size="12" fill="#B83227">서버 (예: gunicorn 2초)</text>
  <rect x="200" y="186" width="90" height="24" rx="4" fill="#FCF5F4" stroke="#B83227"/>
  <text x="245" y="203" font-size="10" fill="#B83227" text-anchor="middle">2초 후 끊음</text>
  <rect x="290" y="186" width="470" height="24" rx="4" fill="#F4F6F8" stroke="#C7D2DA" stroke-dasharray="4,3"/>
  <text x="525" y="203" font-size="10.5" fill="#8A9BA8" text-anchor="middle">서버 입장: 이미 닫힌 커넥션</text>

  <!-- race point -->
  <line x1="290" y1="176" x2="290" y2="250" stroke="#B83227" stroke-width="1.4" stroke-dasharray="3,3"/>
  <circle cx="290" cy="230" r="6" fill="#B83227"/>
  <text x="300" y="234" font-size="11" font-weight="700" fill="#B83227">⚡ 이 틈에 새 요청 도착 → 502</text>
  <line x1="200" y1="230" x2="284" y2="230" stroke="#B83227" stroke-width="1.4" marker-end="url(#lar)"/>
  <text x="205" y="222" font-size="10" fill="#B83227">LB가 요청 전송</text>

  <rect x="40" y="266" width="780" height="52" rx="8" fill="#DFF0E8" stroke="#2E8B6B"/>
  <text x="56" y="288" font-size="12" font-weight="700" fill="#1F6B4E">해결: 서버 Keep-Alive 타임아웃 &gt; LB idle 타임아웃</text>
  <text x="56" y="308" font-size="11" fill="#5A6B78">LB가 항상 먼저 끊게 만들면, 서버가 닫은 커넥션에 요청이 가는 일이 사라진다. (NLB는 350초이므로 다시 정렬 필요)</text>

  <text x="40" y="348" font-size="11.5" fill="#8A9BA8">새벽에만 터지는 이유: 트래픽이 적어 커넥션이 유휴 상태로 오래 남기 때문. 낮에는 재사용되어 끊길 틈이 없다.</text>
</svg>
