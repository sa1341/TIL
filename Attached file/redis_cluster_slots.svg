<svg viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="rcar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
    <marker id="rcrep" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#8A9BA8"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="460" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">Redis Cluster — 16384 해시 슬롯과 마스터/레플리카</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">키를 CRC16 % 16384 로 슬롯에 매핑 → 그 슬롯을 소유한 마스터로 라우팅 · 레플리카는 복사본만 보유(소유권 X)</text>

  <!-- key routing -->
  <rect x="40" y="90" width="180" height="30" rx="6" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="130" y="110" font-size="11.5" fill="#8A5E12" text-anchor="middle">키 "user:1000"</text>
  <line x1="220" y1="105" x2="256" y2="105" stroke="#08748C" stroke-width="1.6" marker-end="url(#rcar)"/>
  <rect x="256" y="90" width="230" height="30" rx="6" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="371" y="110" font-size="11" fill="#8A5E12" text-anchor="middle">CRC16(key) % 16384 = 슬롯 번호</text>
  <line x1="486" y1="105" x2="522" y2="105" stroke="#08748C" stroke-width="1.6" marker-end="url(#rcar)"/>
  <rect x="522" y="90" width="300" height="30" rx="6" fill="#DFF0E8" stroke="#2E8B6B"/>
  <text x="672" y="110" font-size="11" fill="#1F6B4E" text-anchor="middle">해당 슬롯을 소유한 마스터로 요청 전달</text>

  <!-- slot bar -->
  <text x="40" y="150" font-size="12" font-weight="700" fill="#3E5060">16384개 슬롯 (0 ~ 16383) 을 마스터들이 나눠 소유</text>
  <rect x="40" y="158" width="260" height="30" fill="#EAF4F6" stroke="#08748C"/><text x="170" y="178" font-size="11" fill="#065A6E" text-anchor="middle">0 ~ 5460</text>
  <rect x="300" y="158" width="260" height="30" fill="#FCF5F4" stroke="#B83227"/><text x="430" y="178" font-size="11" fill="#B83227" text-anchor="middle">5461 ~ 10922</text>
  <rect x="560" y="158" width="260" height="30" fill="#FBF3E4" stroke="#C88A2E"/><text x="690" y="178" font-size="11" fill="#8A5E12" text-anchor="middle">10923 ~ 16383</text>

  <!-- masters -->
  <g>
    <rect x="60" y="212" width="220" height="70" rx="10" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
    <text x="170" y="238" font-size="13.5" font-weight="700" fill="#065A6E" text-anchor="middle">Master A</text>
    <text x="170" y="258" font-size="10.5" fill="#8A9BA8" text-anchor="middle">슬롯 0~5460 소유</text>
    <line x1="170" y1="188" x2="170" y2="210" stroke="#08748C" stroke-width="1.4" marker-end="url(#rcar)"/>
  </g>
  <g>
    <rect x="320" y="212" width="220" height="70" rx="10" fill="#FCF5F4" stroke="#B83227" stroke-width="1.6"/>
    <text x="430" y="238" font-size="13.5" font-weight="700" fill="#B83227" text-anchor="middle">Master B</text>
    <text x="430" y="258" font-size="10.5" fill="#8A9BA8" text-anchor="middle">슬롯 5461~10922 소유</text>
    <line x1="430" y1="188" x2="430" y2="210" stroke="#B83227" stroke-width="1.4" marker-end="url(#rcar)"/>
  </g>
  <g>
    <rect x="580" y="212" width="220" height="70" rx="10" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
    <text x="690" y="238" font-size="13.5" font-weight="700" fill="#8A5E12" text-anchor="middle">Master C</text>
    <text x="690" y="258" font-size="10.5" fill="#8A9BA8" text-anchor="middle">슬롯 10923~16383 소유</text>
    <line x1="690" y1="188" x2="690" y2="210" stroke="#C88A2E" stroke-width="1.4" marker-end="url(#rcar)"/>
  </g>

  <!-- replicas -->
  <line x1="170" y1="282" x2="170" y2="322" stroke="#8A9BA8" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#rcrep)"/>
  <line x1="430" y1="282" x2="430" y2="322" stroke="#8A9BA8" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#rcrep)"/>
  <line x1="690" y1="282" x2="690" y2="322" stroke="#8A9BA8" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#rcrep)"/>
  <text x="230" y="308" font-size="10" fill="#8A9BA8">복제(replica)</text>
  <rect x="60" y="324" width="220" height="60" rx="10" fill="#ffffff" stroke="#B7D5DC" stroke-dasharray="5,3"/>
  <text x="170" y="348" font-size="12.5" font-weight="700" fill="#5A6B78" text-anchor="middle">Replica A</text>
  <text x="170" y="368" font-size="10" fill="#8A9BA8" text-anchor="middle">A의 복사본 (소유권 없음)</text>
  <rect x="320" y="324" width="220" height="60" rx="10" fill="#ffffff" stroke="#B7D5DC" stroke-dasharray="5,3"/>
  <text x="430" y="348" font-size="12.5" font-weight="700" fill="#5A6B78" text-anchor="middle">Replica B</text>
  <text x="430" y="368" font-size="10" fill="#8A9BA8" text-anchor="middle">B의 복사본</text>
  <rect x="580" y="324" width="220" height="60" rx="10" fill="#ffffff" stroke="#B7D5DC" stroke-dasharray="5,3"/>
  <text x="690" y="348" font-size="12.5" font-weight="700" fill="#5A6B78" text-anchor="middle">Replica C</text>
  <text x="690" y="368" font-size="10" fill="#8A9BA8" text-anchor="middle">C의 복사본</text>

  <text x="40" y="410" font-size="11.5" fill="#8A9BA8">마스터 장애 시 → 붙어 있던 레플리카가 마스터로 승격(failover)되어 해당 슬롯 소유권을 넘겨받는다.</text>
  <text x="40" y="430" font-size="11.5" fill="#8A9BA8">기본적으로 읽기·쓰기는 슬롯을 소유한 마스터로 감 · 레플리카에서 읽으려면 클라이언트가 READONLY 설정.</text>
</svg>
