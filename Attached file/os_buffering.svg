<svg viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="bfar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="820" height="360" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">버퍼링 — 속도가 다른 두 장치를 잇는 완충 지대</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">느린 장치의 데이터를 버퍼에 모아 한꺼번에 전달 → 빠른 장치는 기다리지 않고 다른 일 처리</text>

  <!-- slow device -->
  <rect x="40" y="120" width="170" height="110" rx="10" fill="#F4F6F7" stroke="#8A9BA8" stroke-width="1.6"/>
  <text x="125" y="168" font-size="14" font-weight="700" fill="#5A6B78" text-anchor="middle">느린 장치</text>
  <text x="125" y="190" font-size="11" fill="#8A9BA8" text-anchor="middle">(키보드, 디스크 등)</text>
  <text x="125" y="208" font-size="11" fill="#8A9BA8" text-anchor="middle">데이터를 조금씩 생성</text>

  <!-- drips -->
  <line x1="210" y1="160" x2="290" y2="160" stroke="#8A9BA8" stroke-width="1.4" stroke-dasharray="4,4" marker-end="url(#bfar)"/>
  <line x1="210" y1="180" x2="290" y2="180" stroke="#8A9BA8" stroke-width="1.4" stroke-dasharray="4,4" marker-end="url(#bfar)"/>
  <text x="250" y="150" font-size="10" fill="#8A9BA8" text-anchor="middle">낱개</text>

  <!-- buffer -->
  <rect x="300" y="110" width="200" height="130" rx="10" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="400" y="136" font-size="14" font-weight="700" fill="#8A5E12" text-anchor="middle">버퍼 (Buffer)</text>
  <text x="400" y="155" font-size="10.5" fill="#8A9BA8" text-anchor="middle">바구니에 모아둠</text>
  <rect x="322" y="168" width="26" height="52" rx="3" fill="#ffffff" stroke="#C88A2E"/>
  <rect x="356" y="168" width="26" height="52" rx="3" fill="#ffffff" stroke="#C88A2E"/>
  <rect x="390" y="168" width="26" height="52" rx="3" fill="#ffffff" stroke="#C88A2E"/>
  <rect x="424" y="168" width="26" height="52" rx="3" fill="#ffffff" stroke="#C88A2E"/>
  <rect x="458" y="168" width="26" height="52" rx="3" fill="#F4E4E1" stroke="#C88A2E" stroke-dasharray="3,2"/>

  <!-- bulk transfer -->
  <line x1="500" y1="170" x2="600" y2="170" stroke="#08748C" stroke-width="2.4" marker-end="url(#bfar)"/>
  <text x="550" y="160" font-size="10.5" fill="#065A6E" text-anchor="middle" font-weight="700">한꺼번에</text>

  <!-- fast device -->
  <rect x="610" y="120" width="170" height="110" rx="10" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="695" y="168" font-size="14" font-weight="700" fill="#065A6E" text-anchor="middle">빠른 장치</text>
  <text x="695" y="190" font-size="11" fill="#8A9BA8" text-anchor="middle">(CPU, 메모리)</text>
  <text x="695" y="208" font-size="11" fill="#8A9BA8" text-anchor="middle">대기 없이 처리</text>

  <text x="40" y="288" font-size="12" fill="#8A9BA8">커널도 버퍼를 사용 → 입출력이 끝나기 전에 다른 작업을 할 수 있어 시스템 성능이 좋아진다.</text>
  <text x="40" y="310" font-size="12" fill="#8A9BA8">예) 프린터 스풀러: 출력 데이터를 스풀러에 보낸 뒤 응용 프로그램은 바로 다음 작업을 진행.</text>
</svg>
