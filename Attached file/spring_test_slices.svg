<svg width="820" height="400" viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect x="0" y="0" width="820" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">스프링 테스트 슬라이스 — 무엇을 로드하는가</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">@SpringBootTest는 전체 컨텍스트 · 슬라이스 테스트는 필요한 계층만 로드해서 빠르고 가볍게</text>

  <!-- layers legend -->
  <text x="40" y="98" font-size="11.5" font-weight="700" fill="#3E5060">계층: Web(Controller) · Service · Repository/JPA</text>

  <!-- SpringBootTest -->
  <rect x="40" y="110" width="240" height="250" rx="12" fill="#FCF5F4" stroke="#B83227" stroke-width="1.6"/>
  <text x="160" y="134" font-size="13" font-weight="700" fill="#B83227" text-anchor="middle">@SpringBootTest</text>
  <text x="160" y="152" font-size="10" fill="#8A9BA8" text-anchor="middle">전체 컨텍스트 로드 (무거움)</text>
  <rect x="60" y="164" width="200" height="50" rx="6" fill="#DFF0E8" stroke="#2E8B6B"/><text x="160" y="194" font-size="11" fill="#1F6B4E" text-anchor="middle">Web (Controller)</text>
  <rect x="60" y="222" width="200" height="50" rx="6" fill="#DFF0E8" stroke="#2E8B6B"/><text x="160" y="252" font-size="11" fill="#1F6B4E" text-anchor="middle">Service</text>
  <rect x="60" y="280" width="200" height="50" rx="6" fill="#DFF0E8" stroke="#2E8B6B"/><text x="160" y="310" font-size="11" fill="#1F6B4E" text-anchor="middle">Repository / JPA</text>
  <text x="160" y="350" font-size="10" fill="#8A9BA8" text-anchor="middle">통합 테스트에 적합</text>

  <!-- WebMvcTest -->
  <rect x="300" y="110" width="240" height="250" rx="12" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="420" y="134" font-size="13" font-weight="700" fill="#065A6E" text-anchor="middle">@WebMvcTest</text>
  <text x="420" y="152" font-size="10" fill="#8A9BA8" text-anchor="middle">웹 계층만 로드</text>
  <rect x="320" y="164" width="200" height="50" rx="6" fill="#DFF0E8" stroke="#2E8B6B"/><text x="420" y="188" font-size="11" fill="#1F6B4E" text-anchor="middle">Web (Controller)</text><text x="420" y="204" font-size="9" fill="#8A9BA8" text-anchor="middle">+ Filter·MockMvc</text>
  <rect x="320" y="222" width="200" height="50" rx="6" fill="#F4F6F7" stroke="#CBD5DC" stroke-dasharray="4,3"/><text x="420" y="252" font-size="10.5" fill="#8A9BA8" text-anchor="middle">Service (안 뜸 → @MockBean)</text>
  <rect x="320" y="280" width="200" height="50" rx="6" fill="#F4F6F7" stroke="#CBD5DC" stroke-dasharray="4,3"/><text x="420" y="310" font-size="10.5" fill="#8A9BA8" text-anchor="middle">Repository (안 뜸)</text>
  <text x="420" y="350" font-size="10" fill="#8A9BA8" text-anchor="middle">컨트롤러 단위 테스트</text>

  <!-- DataJpaTest -->
  <rect x="560" y="110" width="240" height="250" rx="12" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="680" y="134" font-size="13" font-weight="700" fill="#8A5E12" text-anchor="middle">@DataJpaTest</text>
  <text x="680" y="152" font-size="10" fill="#8A9BA8" text-anchor="middle">JPA 계층만 로드</text>
  <rect x="580" y="164" width="200" height="50" rx="6" fill="#F4F6F7" stroke="#CBD5DC" stroke-dasharray="4,3"/><text x="680" y="194" font-size="10.5" fill="#8A9BA8" text-anchor="middle">Web (안 뜸)</text>
  <rect x="580" y="222" width="200" height="50" rx="6" fill="#F4F6F7" stroke="#CBD5DC" stroke-dasharray="4,3"/><text x="680" y="252" font-size="10.5" fill="#8A9BA8" text-anchor="middle">Service (안 뜸)</text>
  <rect x="580" y="280" width="200" height="50" rx="6" fill="#DFF0E8" stroke="#2E8B6B"/><text x="680" y="304" font-size="11" fill="#1F6B4E" text-anchor="middle">Repository / JPA</text><text x="680" y="320" font-size="9" fill="#8A9BA8" text-anchor="middle">+ 임베디드 DB</text>
  <text x="680" y="350" font-size="10" fill="#8A9BA8" text-anchor="middle">리포지터리 단위 테스트</text>

  <text x="40" y="388" font-size="11" fill="#8A9BA8">슬라이스 테스트는 뜨는 빈이 적어 빠르다 · @WebMvcTest와 @SpringBootTest는 함께 쓰면 MockMvc 충돌로 에러.</text>
</svg>
