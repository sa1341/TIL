<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="cmar" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8A9BA8"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="420" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">HashMap vs LinkedHashMap vs TreeMap</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">셋 다 Map 구현체 · 순서 보장 여부와 내부 자료구조, 탐색 성능이 다르다</text>

  <!-- HashMap -->
  <rect x="40" y="90" width="250" height="250" rx="12" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="165" y="114" font-size="14" font-weight="700" fill="#065A6E" text-anchor="middle">HashMap</text>
  <text x="165" y="132" font-size="10.5" fill="#8A9BA8" text-anchor="middle">해시 버킷 · 순서 없음 · O(1)</text>
  <rect x="60" y="146" width="40" height="150" rx="4" fill="#ffffff" stroke="#B7D5DC"/>
  <text x="80" y="140" font-size="9" fill="#8A9BA8" text-anchor="middle">버킷</text>
  <rect x="66" y="152" width="28" height="20" rx="3" fill="#DFF0E8" stroke="#2E8B6B"/>
  <rect x="66" y="200" width="28" height="20" rx="3" fill="#DFF0E8" stroke="#2E8B6B"/>
  <rect x="66" y="248" width="28" height="20" rx="3" fill="#DFF0E8" stroke="#2E8B6B"/>
  <!-- collision chain -->
  <rect x="120" y="200" width="50" height="20" rx="3" fill="#ffffff" stroke="#08748C"/><text x="145" y="215" font-size="9" fill="#065A6E" text-anchor="middle">E</text>
  <rect x="188" y="200" width="50" height="20" rx="3" fill="#ffffff" stroke="#08748C"/><text x="213" y="215" font-size="9" fill="#065A6E" text-anchor="middle">E</text>
  <line x1="94" y1="210" x2="118" y2="210" stroke="#8A9BA8" stroke-width="1.2" marker-end="url(#cmar)"/>
  <line x1="170" y1="210" x2="186" y2="210" stroke="#8A9BA8" stroke-width="1.2" marker-end="url(#cmar)"/>
  <text x="180" y="192" font-size="9" fill="#8A9BA8">해시 충돌 시 List로 연결</text>
  <text x="60" y="320" font-size="11" fill="#3E5060">get O(1) · key null 허용</text>

  <!-- LinkedHashMap -->
  <rect x="305" y="90" width="250" height="250" rx="12" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="430" y="114" font-size="14" font-weight="700" fill="#8A5E12" text-anchor="middle">LinkedHashMap</text>
  <text x="430" y="132" font-size="10.5" fill="#8A9BA8" text-anchor="middle">해시 + 입력 순서 유지 · O(1)</text>
  <rect x="330" y="160" width="80" height="30" rx="5" fill="#ffffff" stroke="#C88A2E"/><text x="370" y="180" font-size="10" fill="#8A5E12" text-anchor="middle">1st</text>
  <rect x="330" y="205" width="80" height="30" rx="5" fill="#ffffff" stroke="#C88A2E"/><text x="370" y="225" font-size="10" fill="#8A5E12" text-anchor="middle">2nd</text>
  <rect x="330" y="250" width="80" height="30" rx="5" fill="#ffffff" stroke="#C88A2E"/><text x="370" y="270" font-size="10" fill="#8A5E12" text-anchor="middle">3rd</text>
  <line x1="370" y1="190" x2="370" y2="203" stroke="#8A9BA8" stroke-width="1.2" marker-end="url(#cmar)"/>
  <line x1="370" y1="235" x2="370" y2="248" stroke="#8A9BA8" stroke-width="1.2" marker-end="url(#cmar)"/>
  <text x="430" y="185" font-size="10" fill="#8A9BA8">Entry가 Before/After로</text>
  <text x="430" y="202" font-size="10" fill="#8A9BA8">연결 → put() 순서 유지</text>
  <text x="325" y="320" font-size="11" fill="#3E5060">삽입한 순서대로 순회</text>

  <!-- TreeMap -->
  <rect x="570" y="90" width="250" height="250" rx="12" fill="#FCF5F4" stroke="#B83227" stroke-width="1.6"/>
  <text x="695" y="114" font-size="14" font-weight="700" fill="#B83227" text-anchor="middle">TreeMap</text>
  <text x="695" y="132" font-size="10.5" fill="#8A9BA8" text-anchor="middle">정렬 트리 · 키 정렬 · O(log n)</text>
  <rect x="675" y="152" width="40" height="26" rx="4" fill="#ffffff" stroke="#B83227"/><text x="695" y="170" font-size="10" fill="#B83227" text-anchor="middle">50</text>
  <rect x="615" y="210" width="40" height="26" rx="4" fill="#ffffff" stroke="#B83227"/><text x="635" y="228" font-size="10" fill="#B83227" text-anchor="middle">30</text>
  <rect x="735" y="210" width="40" height="26" rx="4" fill="#ffffff" stroke="#B83227"/><text x="755" y="228" font-size="10" fill="#B83227" text-anchor="middle">70</text>
  <line x1="685" y1="178" x2="645" y2="208" stroke="#8A9BA8" stroke-width="1.2"/>
  <line x1="705" y1="178" x2="745" y2="208" stroke="#8A9BA8" stroke-width="1.2"/>
  <text x="695" y="270" font-size="10" fill="#8A9BA8" text-anchor="middle">이진 탐색 트리(레드-블랙)</text>
  <text x="615" y="320" font-size="11" fill="#3E5060">Comparator로 정렬 변경</text>

  <text x="40" y="372" font-size="11.5" fill="#8A9BA8">순서 불필요 → HashMap · 입력 순서 필요 → LinkedHashMap · 키 정렬 필요 → TreeMap · 스레드 안전 필요 → ConcurrentHashMap</text>
</svg>
