<svg width="860" height="470" viewBox="0 0 860 470" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="rpar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="470" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">코드 RAG 파이프라인 — 인덱싱과 검색</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">인덱싱(사전 준비)과 질의(실시간 검색)를 분리해 보면 각 단계의 역할이 뚜렷해진다.</text>

  <!-- ===== Indexing lane ===== -->
  <rect x="32" y="88" width="796" height="150" rx="12" fill="#F7FAFB" stroke="#B7D5DC"/>
  <text x="52" y="112" font-size="12.5" font-weight="700" fill="#3E5060">① 인덱싱 (오프라인 · 커밋마다 갱신)</text>

  <rect x="52" y="128" width="120" height="86" rx="9" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="112" y="165" font-size="12.5" font-weight="700" fill="#8A5E12" text-anchor="middle">코드베이스</text>
  <text x="112" y="184" font-size="10" fill="#8A9BA8" text-anchor="middle">수천~수만 파일</text>
  <line x1="172" y1="171" x2="204" y2="171" stroke="#08748C" stroke-width="1.6" marker-end="url(#rpar)"/>

  <rect x="206" y="128" width="130" height="86" rx="9" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="271" y="160" font-size="12.5" font-weight="700" fill="#065A6E" text-anchor="middle">AST 청킹</text>
  <text x="271" y="179" font-size="10" fill="#5A6B78" text-anchor="middle">함수·클래스</text>
  <text x="271" y="194" font-size="10" fill="#5A6B78" text-anchor="middle">단위 분할</text>
  <line x1="336" y1="171" x2="368" y2="171" stroke="#08748C" stroke-width="1.6" marker-end="url(#rpar)"/>

  <rect x="370" y="128" width="158" height="86" rx="9" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="449" y="156" font-size="12" font-weight="700" fill="#065A6E" text-anchor="middle">맥락 주입</text>
  <text x="449" y="174" font-size="9.5" fill="#5A6B78" text-anchor="middle">청크 앞에 "이 코드가</text>
  <text x="449" y="188" font-size="9.5" fill="#5A6B78" text-anchor="middle">무엇의 일부인지" 요약</text>
  <text x="449" y="205" font-size="9" fill="#C88A2E" text-anchor="middle">Contextual Retrieval</text>
  <line x1="528" y1="171" x2="560" y2="171" stroke="#08748C" stroke-width="1.6" marker-end="url(#rpar)"/>

  <rect x="562" y="128" width="246" height="86" rx="9" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.6"/>
  <text x="685" y="156" font-size="12.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">이중 인덱스 구축</text>
  <text x="685" y="176" font-size="10" fill="#3E7A5E" text-anchor="middle">벡터(임베딩) — 의미 유사도</text>
  <text x="685" y="192" font-size="10" fill="#3E7A5E" text-anchor="middle">BM25(키워드) — 정확 일치</text>
  <text x="685" y="207" font-size="9" fill="#8A9BA8" text-anchor="middle">코드 특화 임베딩: voyage-code · Gemini</text>

  <!-- ===== Query lane ===== -->
  <rect x="32" y="256" width="796" height="150" rx="12" fill="#FBFCFD" stroke="#D8E3E8"/>
  <text x="52" y="280" font-size="12.5" font-weight="700" fill="#3E5060">② 질의 (온라인 · 요청마다)</text>

  <rect x="52" y="296" width="120" height="86" rx="9" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="112" y="333" font-size="12" font-weight="700" fill="#8A5E12" text-anchor="middle">사용자 질문</text>
  <text x="112" y="352" font-size="9.5" fill="#8A9BA8" text-anchor="middle">"결제 실패 처리는?"</text>
  <line x1="172" y1="339" x2="204" y2="339" stroke="#08748C" stroke-width="1.6" marker-end="url(#rpar)"/>

  <rect x="206" y="296" width="170" height="86" rx="9" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="291" y="324" font-size="12" font-weight="700" fill="#065A6E" text-anchor="middle">하이브리드 검색</text>
  <text x="291" y="343" font-size="9.5" fill="#5A6B78" text-anchor="middle">벡터 + BM25 결과를</text>
  <text x="291" y="357" font-size="9.5" fill="#5A6B78" text-anchor="middle">합쳐 후보 K개 회수</text>
  <line x1="376" y1="339" x2="408" y2="339" stroke="#08748C" stroke-width="1.6" marker-end="url(#rpar)"/>

  <rect x="410" y="296" width="150" height="86" rx="9" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="485" y="324" font-size="12" font-weight="700" fill="#065A6E" text-anchor="middle">리랭킹</text>
  <text x="485" y="343" font-size="9.5" fill="#5A6B78" text-anchor="middle">질문과의 관련도로</text>
  <text x="485" y="357" font-size="9.5" fill="#5A6B78" text-anchor="middle">상위 몇 개만 선별</text>
  <line x1="560" y1="339" x2="592" y2="339" stroke="#08748C" stroke-width="1.6" marker-end="url(#rpar)"/>

  <rect x="594" y="296" width="214" height="86" rx="9" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.6"/>
  <text x="701" y="328" font-size="12.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">LLM 답변 생성</text>
  <text x="701" y="348" font-size="9.5" fill="#3E7A5E" text-anchor="middle">선별된 코드 청크를</text>
  <text x="701" y="362" font-size="9.5" fill="#3E7A5E" text-anchor="middle">프롬프트에 넣어 답변</text>

  <text x="40" y="432" font-size="11.5" fill="#8A9BA8">· Anthropic 실험: 맥락 주입(Contextual Embedding+BM25)으로 검색 실패 -49%, 리랭킹까지 더하면 -67%.</text>
  <text x="40" y="454" font-size="11.5" fill="#8A9BA8">· 코드베이스가 작으면(≈20만 토큰 이하) 인덱싱 없이 통째로 컨텍스트에 넣는 편이 더 정확할 수 있다.</text>
</svg>
