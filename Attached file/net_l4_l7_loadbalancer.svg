<svg width="860" height="456" viewBox="0 0 860 456" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="llar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#8A9BA8"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="456" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">L4 vs L7 로드밸런서 — 무엇을 보고 분산하는가</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">L4는 전송 계층(IP·Port)까지, L7은 응용 계층(URL·Header·Cookie)까지 들여다보고 라우팅한다.</text>

  <!-- ===== LEFT panel: L4 ===== -->
  <rect x="40" y="88" width="380" height="322" rx="12" fill="#F6FAFB" stroke="#B7D5DC"/>
  <rect x="56" y="104" width="348" height="30" rx="8" fill="#08748C"/>
  <text x="230" y="124" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle">L4 로드밸런서 · 전송 계층 (TCP/UDP)</text>

  <!-- flow -->
  <rect x="58" y="150" width="80" height="40" rx="7" fill="#EAF4F6" stroke="#08748C" stroke-width="1.4"/>
  <text x="98" y="174" font-size="10.5" fill="#065A6E" text-anchor="middle">클라이언트</text>
  <line x1="138" y1="170" x2="164" y2="170" stroke="#8A9BA8" stroke-width="1.5" marker-end="url(#llar)"/>
  <rect x="166" y="146" width="92" height="48" rx="8" fill="#08748C"/>
  <text x="212" y="167" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">L4 LB</text>
  <text x="212" y="183" font-size="8.5" fill="#CDE8ED" text-anchor="middle">IP:Port만 확인</text>
  <line x1="258" y1="170" x2="284" y2="170" stroke="#8A9BA8" stroke-width="1.5" marker-end="url(#llar)"/>
  <rect x="286" y="146" width="118" height="20" rx="5" fill="#F4F6F7" stroke="#B7D5DC"/><text x="345" y="160" font-size="9.5" fill="#3E5060" text-anchor="middle">web 서버</text>
  <rect x="286" y="170" width="118" height="20" rx="5" fill="#F4F6F7" stroke="#B7D5DC"/><text x="345" y="184" font-size="9.5" fill="#3E5060" text-anchor="middle">web 서버</text>
  <text x="345" y="140" font-size="8.5" fill="#8A9BA8" text-anchor="middle">동일 서비스 풀</text>

  <line x1="58" y1="212" x2="402" y2="212" stroke="#E1EAEE"/>
  <text x="58" y="236" font-size="10.5" fill="#3E5060">· <tspan font-weight="700">보는 것:</tspan> 출발·목적지 IP · Port (패킷 헤더만)</text>
  <text x="58" y="258" font-size="10.5" fill="#3E5060">· <tspan font-weight="700">방식:</tspan> 연결을 그대로 전달 — 내용은 안 봄</text>
  <text x="58" y="280" font-size="10.5" fill="#3E5060">· <tspan font-weight="700">장점:</tspan> 초고속 · 초저지연 · 고정 IP</text>
  <text x="58" y="302" font-size="10.5" fill="#3E5060">· 단순해서 장애 지점·오버헤드가 적다</text>

  <rect x="58" y="320" width="346" height="42" rx="8" fill="#EDF4F1" stroke="#17212B" stroke-width="1.2"/>
  <text x="74" y="337" font-size="10.5" font-weight="700" fill="#17212B">AWS 예시 — NLB (Network Load Balancer)</text>
  <text x="74" y="353" font-size="9.5" fill="#5A6B78">TCP·UDP·TLS · 초당 수백만 요청 · 고정 IP · 클라이언트 IP 보존</text>

  <!-- ===== RIGHT panel: L7 ===== -->
  <rect x="440" y="88" width="380" height="322" rx="12" fill="#F6FBF8" stroke="#C3E2D2"/>
  <rect x="456" y="104" width="348" height="30" rx="8" fill="#2E8B6B"/>
  <text x="630" y="124" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle">L7 로드밸런서 · 응용 계층 (HTTP/HTTPS)</text>

  <!-- flow -->
  <rect x="456" y="150" width="80" height="40" rx="7" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.4"/>
  <text x="496" y="174" font-size="10.5" fill="#1F6B4E" text-anchor="middle">클라이언트</text>
  <line x1="536" y1="170" x2="560" y2="170" stroke="#8A9BA8" stroke-width="1.5" marker-end="url(#llar)"/>
  <rect x="562" y="146" width="92" height="48" rx="8" fill="#2E8B6B"/>
  <text x="608" y="167" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">L7 LB</text>
  <text x="608" y="183" font-size="8.5" fill="#CDE9DC" text-anchor="middle">내용 기반 스위칭</text>

  <!-- branch -->
  <path d="M654 160 C 680 150, 690 146, 700 143" fill="none" stroke="#8A9BA8" stroke-width="1.5" marker-end="url(#llar)"/>
  <text x="682" y="140" font-size="8.5" fill="#8A9BA8" text-anchor="middle">/order</text>
  <rect x="704" y="140" width="104" height="34" rx="7" fill="#F4F6F7" stroke="#B7D5DC"/>
  <text x="756" y="161" font-size="10" fill="#3E5060" text-anchor="middle">주문 서버</text>
  <path d="M654 182 C 680 190, 690 194, 700 197" fill="none" stroke="#8A9BA8" stroke-width="1.5" marker-end="url(#llar)"/>
  <text x="682" y="207" font-size="8.5" fill="#8A9BA8" text-anchor="middle">/pay</text>
  <rect x="704" y="180" width="104" height="34" rx="7" fill="#F4F6F7" stroke="#B7D5DC"/>
  <text x="756" y="201" font-size="10" fill="#3E5060" text-anchor="middle">결제 서버</text>

  <line x1="456" y1="228" x2="804" y2="228" stroke="#DDEDE4"/>
  <text x="458" y="252" font-size="10.5" fill="#3E5060">· <tspan font-weight="700">보는 것:</tspan> URL · Host · Header · Cookie · Payload</text>
  <text x="458" y="274" font-size="10.5" fill="#3E5060">· <tspan font-weight="700">방식:</tspan> 내용 기반 스위칭 (경로·호스트 라우팅)</text>
  <text x="458" y="296" font-size="10.5" fill="#3E5060">· <tspan font-weight="700">장점:</tspan> 세밀한 라우팅 · WAF 보안 검사</text>
  <text x="458" y="318" font-size="10.5" fill="#B83227">· <tspan font-weight="700">단점:</tspan> 내용 분석 → 리소스를 더 쓴다</text>

  <rect x="458" y="332" width="346" height="42" rx="8" fill="#EDF4F1" stroke="#17212B" stroke-width="1.2"/>
  <text x="474" y="349" font-size="10.5" font-weight="700" fill="#17212B">AWS 예시 — ALB (Application Load Balancer)</text>
  <text x="474" y="365" font-size="9.5" fill="#5A6B78">HTTP·HTTPS · 경로/호스트/헤더 라우팅 · 마이크로서비스 · Lambda 타깃</text>

  <text x="40" y="398" font-size="11.5" fill="#8A9BA8"> </text>
  <text x="40" y="434" font-size="11.5" fill="#8A9BA8">실무: 마이크로서비스를 경로별로 나누면 L7(ALB), 극한 성능·L4 고정 IP가 필요하면 NLB. 쿠버네티스 Ingress는 대체로 L7이다.</text>
</svg>
