<svg width="860" height="400" viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="ruar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#8A9BA8"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">롤링 업데이트 — 서비스 중단 없이 조금씩 교체</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">구버전(v1) Pod를 조금씩 줄이고 신버전(v2)을 조금씩 늘리며 총 용량을 유지 · maxSurge / maxUnavailable로 속도 조절</text>

  <!-- legend -->
  <rect x="600" y="86" width="16" height="16" rx="3" fill="#EAF4F6" stroke="#08748C"/><text x="622" y="99" font-size="11" fill="#3E5060">v1 (구버전)</text>
  <rect x="712" y="86" width="16" height="16" rx="3" fill="#DFF0E8" stroke="#2E8B6B"/><text x="734" y="99" font-size="11" fill="#3E5060">v2 (신버전)</text>

  <!-- Phase 1 -->
  <text x="130" y="130" font-size="12.5" font-weight="700" fill="#3E5060" text-anchor="middle">① 시작 (v1 × 4)</text>
  <g>
    <rect x="60" y="146" width="140" height="180" rx="8" fill="#F4F6F7" stroke="#B7D5DC"/>
    <rect x="74" y="162" width="52" height="44" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="100" y="189" font-size="10" fill="#065A6E" text-anchor="middle">v1</text>
    <rect x="134" y="162" width="52" height="44" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="160" y="189" font-size="10" fill="#065A6E" text-anchor="middle">v1</text>
    <rect x="74" y="214" width="52" height="44" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="100" y="241" font-size="10" fill="#065A6E" text-anchor="middle">v1</text>
    <rect x="134" y="214" width="52" height="44" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="160" y="241" font-size="10" fill="#065A6E" text-anchor="middle">v1</text>
  </g>
  <text x="130" y="346" font-size="10.5" fill="#8A9BA8" text-anchor="middle">용량 100%</text>

  <line x1="212" y1="236" x2="248" y2="236" stroke="#8A9BA8" stroke-width="1.6" marker-end="url(#ruar)"/>

  <!-- Phase 2 -->
  <text x="330" y="130" font-size="12.5" font-weight="700" fill="#3E5060" text-anchor="middle">② 교체 중 (v1×2 + v2×2)</text>
  <g>
    <rect x="260" y="146" width="140" height="180" rx="8" fill="#F4F6F7" stroke="#B7D5DC"/>
    <rect x="274" y="162" width="52" height="44" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="300" y="189" font-size="10" fill="#065A6E" text-anchor="middle">v1</text>
    <rect x="334" y="162" width="52" height="44" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="360" y="189" font-size="10" fill="#065A6E" text-anchor="middle">v1</text>
    <rect x="274" y="214" width="52" height="44" rx="5" fill="#DFF0E8" stroke="#2E8B6B"/><text x="300" y="241" font-size="10" fill="#1F6B4E" text-anchor="middle">v2</text>
    <rect x="334" y="214" width="52" height="44" rx="5" fill="#DFF0E8" stroke="#2E8B6B"/><text x="360" y="241" font-size="10" fill="#1F6B4E" text-anchor="middle">v2</text>
  </g>
  <text x="330" y="346" font-size="10.5" fill="#8A9BA8" text-anchor="middle">용량 유지 (무중단)</text>

  <line x1="412" y1="236" x2="448" y2="236" stroke="#8A9BA8" stroke-width="1.6" marker-end="url(#ruar)"/>

  <!-- Phase 3 -->
  <text x="530" y="130" font-size="12.5" font-weight="700" fill="#3E5060" text-anchor="middle">③ 완료 (v2 × 4)</text>
  <g>
    <rect x="460" y="146" width="140" height="180" rx="8" fill="#F4F6F7" stroke="#B7D5DC"/>
    <rect x="474" y="162" width="52" height="44" rx="5" fill="#DFF0E8" stroke="#2E8B6B"/><text x="500" y="189" font-size="10" fill="#1F6B4E" text-anchor="middle">v2</text>
    <rect x="534" y="162" width="52" height="44" rx="5" fill="#DFF0E8" stroke="#2E8B6B"/><text x="560" y="189" font-size="10" fill="#1F6B4E" text-anchor="middle">v2</text>
    <rect x="474" y="214" width="52" height="44" rx="5" fill="#DFF0E8" stroke="#2E8B6B"/><text x="500" y="241" font-size="10" fill="#1F6B4E" text-anchor="middle">v2</text>
    <rect x="534" y="214" width="52" height="44" rx="5" fill="#DFF0E8" stroke="#2E8B6B"/><text x="560" y="241" font-size="10" fill="#1F6B4E" text-anchor="middle">v2</text>
  </g>
  <text x="530" y="346" font-size="10.5" fill="#8A9BA8" text-anchor="middle">용량 100%</text>

  <!-- params -->
  <rect x="628" y="146" width="200" height="180" rx="10" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.4"/>
  <text x="728" y="170" font-size="12.5" font-weight="700" fill="#8A5E12" text-anchor="middle">조절 매개변수</text>
  <text x="644" y="196" font-size="11" fill="#8A5E12" font-weight="700">maxUnavailable</text>
  <text x="644" y="213" font-size="10.5" fill="#8A9BA8">동시에 내릴 수 있는</text>
  <text x="644" y="228" font-size="10.5" fill="#8A9BA8">최대 Pod 수(가용성 하한)</text>
  <text x="644" y="256" font-size="11" fill="#8A5E12" font-weight="700">maxSurge</text>
  <text x="644" y="273" font-size="10.5" fill="#8A9BA8">추가로 띄울 수 있는</text>
  <text x="644" y="288" font-size="10.5" fill="#8A9BA8">최대 Pod 수(용량 상한)</text>
  <text x="644" y="314" font-size="10" fill="#C88A2E">maxSurge 100% = 블루/그린</text>
</svg>
