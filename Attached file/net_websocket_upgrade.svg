<svg viewBox="0 0 860 350" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="wsar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="350" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">WebSocket은 왜 HTTP로 시작할까</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">인터넷 인프라가 사실상 HTTP만 통과시키기 때문 — HTTP를 빌려 뚫고, 그 뒤 양방향 전환</text>

  <rect x="40" y="98" width="140" height="50" rx="10" fill="#EAF4F6" stroke="#08748C"/>
  <text x="110" y="128" font-size="12" font-weight="700" fill="#065A6E" text-anchor="middle">클라이언트</text>
  <rect x="680" y="98" width="140" height="50" rx="10" fill="#EAF4F6" stroke="#08748C"/>
  <text x="750" y="128" font-size="12" font-weight="700" fill="#065A6E" text-anchor="middle">서버</text>

  <!-- middle boxes = infra -->
  <rect x="300" y="100" width="260" height="46" rx="8" fill="#F4F6F8" stroke="#C7D2DA"/>
  <text x="430" y="120" font-size="10.5" fill="#5A6B78" text-anchor="middle">중간 장비 (프록시·방화벽)</text>
  <text x="430" y="136" font-size="10" fill="#8A9BA8" text-anchor="middle">HTTP만 통과시킴</text>

  <line x1="180" y1="170" x2="678" y2="170" stroke="#08748C" stroke-width="1.4" marker-end="url(#wsar)"/>
  <rect x="300" y="158" width="260" height="24" rx="4" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="430" y="175" font-size="10.5" fill="#8A5E12" text-anchor="middle">① HTTP Upgrade 핸드셰이크</text>

  <line x1="678" y1="204" x2="182" y2="204" stroke="#2E8B6B" stroke-width="1.4"/>
  <line x1="180" y1="222" x2="678" y2="222" stroke="#2E8B6B" stroke-width="1.4"/>
  <rect x="300" y="196" width="260" height="34" rx="4" fill="#DFF0E8" stroke="#2E8B6B"/>
  <text x="430" y="217" font-size="10.5" fill="#1F6B4E" text-anchor="middle">② 이후 양방향 통신 (full-duplex)</text>

  <text x="40" y="266" font-size="11.5" fill="#8A9BA8">HTTP로 시작하니 기존 웹의 보안·라우팅 자산도 그대로 재사용. (인증을 새로 정의하지 않아도 됨)</text>
  <rect x="40" y="282" width="780" height="46" rx="8" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="56" y="303" font-size="11" font-weight="700" fill="#8A5E12">역설: 단방향 알림이면 WebSocket이 과함 → SSE + HTTP/2 멀티플렉싱으로 충분</text>
  <text x="56" y="321" font-size="10.5" fill="#5A6B78">HTTP를 빌렸던 WebSocket이, HTTP가 진화하자 단방향 영역을 SSE에 내주고 있다.</text>
</svg>
