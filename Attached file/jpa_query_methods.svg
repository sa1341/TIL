<svg width="820" height="410" viewBox="0 0 820 410" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="jqar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="820" height="410" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">JPA 쿼리 방법 — 테이블이 아니라 '객체(엔티티)'를 대상으로</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">JPQL·Criteria·QueryDSL은 엔티티를 대상으로 질의 → JPA가 SQL로 변환 → DB 실행 · Native SQL만 직접 SQL 작성</text>

  <!-- query methods -->
  <text x="130" y="100" font-size="12.5" font-weight="700" fill="#3E5060" text-anchor="middle">쿼리 작성 방법</text>
  <rect x="40" y="112" width="180" height="46" rx="8" fill="#EAF4F6" stroke="#08748C"/><text x="130" y="134" font-size="12" font-weight="700" fill="#065A6E" text-anchor="middle">JPQL</text><text x="130" y="150" font-size="9.5" fill="#8A9BA8" text-anchor="middle">엔티티 대상 객체지향 쿼리(문자열)</text>
  <rect x="40" y="166" width="180" height="46" rx="8" fill="#EAF4F6" stroke="#08748C"/><text x="130" y="188" font-size="12" font-weight="700" fill="#065A6E" text-anchor="middle">Criteria</text><text x="130" y="204" font-size="9.5" fill="#8A9BA8" text-anchor="middle">자바 코드로 JPQL 구성(타입 안전)</text>
  <rect x="40" y="220" width="180" height="46" rx="8" fill="#EAF4F6" stroke="#08748C"/><text x="130" y="242" font-size="12" font-weight="700" fill="#065A6E" text-anchor="middle">QueryDSL</text><text x="130" y="258" font-size="9.5" fill="#8A9BA8" text-anchor="middle">코드 기반·가독성 좋음(비표준, 인기)</text>
  <rect x="40" y="274" width="180" height="46" rx="8" fill="#FBF3E4" stroke="#C88A2E"/><text x="130" y="296" font-size="12" font-weight="700" fill="#8A5E12" text-anchor="middle">Native SQL</text><text x="130" y="312" font-size="9.5" fill="#8A9BA8" text-anchor="middle">DB 종속 SQL 직접 작성</text>

  <!-- arrows to JPA -->
  <line x1="220" y1="135" x2="330" y2="190" stroke="#08748C" stroke-width="1.4" marker-end="url(#jqar)"/>
  <line x1="220" y1="189" x2="330" y2="200" stroke="#08748C" stroke-width="1.4" marker-end="url(#jqar)"/>
  <line x1="220" y1="243" x2="330" y2="210" stroke="#08748C" stroke-width="1.4" marker-end="url(#jqar)"/>
  <line x1="220" y1="297" x2="470" y2="250" stroke="#C88A2E" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#jqar)"/>
  <text x="300" y="330" font-size="9.5" fill="#C88A2E">Native는 변환 없이 바로</text>

  <!-- JPA translator -->
  <rect x="335" y="150" width="150" height="100" rx="12" fill="#FCF5F4" stroke="#B83227" stroke-width="1.6"/>
  <text x="410" y="192" font-size="13.5" font-weight="700" fill="#B83227" text-anchor="middle">JPA</text>
  <text x="410" y="214" font-size="10.5" fill="#8A9BA8" text-anchor="middle">JPQL → SQL 변환</text>
  <text x="410" y="230" font-size="10.5" fill="#8A9BA8" text-anchor="middle">(방언 Dialect 적용)</text>

  <!-- SQL -->
  <line x1="485" y1="200" x2="560" y2="200" stroke="#08748C" stroke-width="1.6" marker-end="url(#jqar)"/>
  <rect x="565" y="170" width="130" height="60" rx="10" fill="#DFF0E8" stroke="#2E8B6B"/>
  <text x="630" y="196" font-size="12.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">SQL</text>
  <text x="630" y="214" font-size="10" fill="#8A9BA8" text-anchor="middle">실제 실행 쿼리</text>

  <!-- DB -->
  <line x1="695" y1="200" x2="740" y2="200" stroke="#08748C" stroke-width="1.6" marker-end="url(#jqar)"/>
  <path d="M 748 176 a 30 8 0 0 1 60 0 v 48 a 30 8 0 0 1 -60 0 z" fill="#F4F6F7" stroke="#8A9BA8"/>
  <ellipse cx="778" cy="176" rx="30" ry="8" fill="#ffffff" stroke="#8A9BA8"/>
  <text x="778" y="212" font-size="11" fill="#5A6B78" text-anchor="middle">DB</text>

  <text x="40" y="360" font-size="11.5" fill="#8A9BA8">핵심: JPQL은 `SELECT m FROM Member m` 처럼 테이블이 아닌 **엔티티 객체**를 대상으로 질의한다(별칭 필수).</text>
  <text x="40" y="382" font-size="11.5" fill="#8A9BA8">덕분에 특정 DB에 종속되지 않고, JPA가 DB 방언에 맞는 SQL로 변환해 준다.</text>
</svg>
