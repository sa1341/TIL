<svg viewBox="0 0 860 380" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="jsar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
    <marker id="jsar2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#2E8B6B"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="380" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">Java 직렬화 / 역직렬화</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">JVM 메모리의 객체 ↔ 바이트 스트림 · 파일 저장·네트워크 전송처럼 JVM 밖으로 객체를 내보내고 다시 복원</text>

  <!-- Object A (JVM 1) -->
  <rect x="40" y="110" width="180" height="150" rx="12" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="130" y="134" font-size="12.5" font-weight="700" fill="#065A6E" text-anchor="middle">JVM (A 시스템)</text>
  <rect x="62" y="150" width="136" height="90" rx="8" fill="#ffffff" stroke="#B7D5DC"/>
  <text x="130" y="176" font-size="12" font-weight="700" fill="#17212B" text-anchor="middle">객체 (Object)</text>
  <text x="130" y="197" font-size="10" fill="#8A9BA8" text-anchor="middle">Heap에 상주</text>
  <text x="130" y="216" font-size="10" fill="#8A9BA8" text-anchor="middle">implements</text>
  <text x="130" y="230" font-size="10" fill="#8A9BA8" text-anchor="middle">Serializable</text>

  <!-- serialize arrow -->
  <line x1="220" y1="160" x2="320" y2="160" stroke="#08748C" stroke-width="1.8" marker-end="url(#jsar)"/>
  <text x="270" y="150" font-size="11" fill="#065A6E" text-anchor="middle" font-weight="700">직렬화</text>
  <text x="270" y="178" font-size="9.5" fill="#8A9BA8" text-anchor="middle">writeObject()</text>

  <!-- byte stream -->
  <rect x="325" y="110" width="210" height="150" rx="12" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="430" y="134" font-size="12.5" font-weight="700" fill="#8A5E12" text-anchor="middle">바이트 스트림 (byte[])</text>
  <text x="430" y="156" font-size="10.5" fill="#8A9BA8" text-anchor="middle">0xAC 0xED 00 05 …</text>
  <rect x="345" y="172" width="170" height="30" rx="5" fill="#ffffff" stroke="#E5DCC7"/><text x="430" y="192" font-size="10.5" fill="#3E5060" text-anchor="middle">💾 파일에 저장</text>
  <rect x="345" y="210" width="170" height="30" rx="5" fill="#ffffff" stroke="#E5DCC7"/><text x="430" y="230" font-size="10.5" fill="#3E5060" text-anchor="middle">🌐 네트워크로 전송</text>

  <!-- deserialize arrow -->
  <line x1="535" y1="160" x2="635" y2="160" stroke="#2E8B6B" stroke-width="1.8" marker-end="url(#jsar2)"/>
  <text x="585" y="150" font-size="11" fill="#1F6B4E" text-anchor="middle" font-weight="700">역직렬화</text>
  <text x="585" y="178" font-size="9.5" fill="#8A9BA8" text-anchor="middle">readObject()</text>

  <!-- Object B (JVM 2) -->
  <rect x="640" y="110" width="180" height="150" rx="12" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.6"/>
  <text x="730" y="134" font-size="12.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">JVM (B 시스템)</text>
  <rect x="662" y="150" width="136" height="90" rx="8" fill="#ffffff" stroke="#B7D5DC"/>
  <text x="730" y="185" font-size="12" font-weight="700" fill="#17212B" text-anchor="middle">동일한 객체로</text>
  <text x="730" y="205" font-size="12" font-weight="700" fill="#17212B" text-anchor="middle">복원</text>

  <text x="40" y="300" font-size="11.5" fill="#8A9BA8">주의: `serialVersionUID`가 다르면 역직렬화 시 InvalidClassException 발생 → 클래스 변경 시 호환성 관리 필요.</text>
  <text x="40" y="322" font-size="11.5" fill="#8A9BA8">`transient` 필드는 직렬화에서 제외됨(비밀번호 등 민감정보·불필요한 값 제외에 사용).</text>
</svg>
