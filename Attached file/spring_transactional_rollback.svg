<svg width="860" height="330" viewBox="0 0 860 330" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect x="0" y="0" width="860" height="330" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">@Transactional 기본 롤백 규칙 — 자바 예외 철학</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">복구 가능(Checked)은 살리고, 복구 불가능(Unchecked)만 자동 롤백</text>

  <!-- Checked -->
  <rect x="40" y="98" width="380" height="120" rx="12" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="230" y="124" font-size="14" font-weight="700" fill="#8A5E12" text-anchor="middle">Checked Exception</text>
  <text x="230" y="146" font-size="11" fill="#8A9BA8" text-anchor="middle">예측 가능한 외부 실패 (복구 가능)</text>
  <text x="230" y="170" font-size="11" fill="#5A6B78" text-anchor="middle">IOException, SQLException …</text>
  <rect x="80" y="182" width="300" height="26" rx="5" fill="#F6EAD2"/>
  <text x="230" y="200" font-size="11" font-weight="700" fill="#8A5E12" text-anchor="middle">롤백 안 함 (트랜잭션 유지)</text>

  <!-- Unchecked -->
  <rect x="440" y="98" width="380" height="120" rx="12" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.6"/>
  <text x="630" y="124" font-size="14" font-weight="700" fill="#1F6B4E" text-anchor="middle">RuntimeException (Unchecked)</text>
  <text x="630" y="146" font-size="11" fill="#8A9BA8" text-anchor="middle">코드가 잘못된 결과 (복구 불가능)</text>
  <text x="630" y="170" font-size="11" fill="#5A6B78" text-anchor="middle">NullPointerException …</text>
  <rect x="480" y="182" width="300" height="26" rx="5" fill="#CDE9DC"/>
  <text x="630" y="200" font-size="11" font-weight="700" fill="#1F6B4E" text-anchor="middle">자동 롤백 ✓</text>

  <rect x="40" y="240" width="780" height="60" rx="10" fill="#EAF4F6" stroke="#B7D5DC"/>
  <text x="56" y="263" font-size="12" font-weight="700" fill="#065A6E">실무의 관습 — @Transactional(rollbackFor = Exception.class)</text>
  <text x="56" y="284" font-size="11" fill="#5A6B78">대부분 IOException·SQLException도 그냥 던지며 롤백을 기대 → 자바 예외 철학을 현실에 맞춰 재정의. 코틀린은 Checked를 아예 없앰.</text>
</svg>
