<svg width="860" height="340" viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="bar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="340" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">Base64는 왜 33% 커질까 — 8비트를 6비트로</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">바이너리가 텍스트 프로토콜(JSON·HTTP·메일)을 안전하게 통과하기 위한 최소 비용</text>

  <!-- 8bit -->
  <text x="40" y="108" font-size="12" font-weight="700" fill="#3E5060">원본 바이너리 — 8비트 단위 (3바이트 = 24비트)</text>
  <rect x="40" y="118" width="240" height="34" rx="4" fill="#EAF4F6" stroke="#08748C"/><text x="160" y="140" font-size="11" fill="#065A6E" text-anchor="middle">8bit</text>
  <rect x="284" y="118" width="240" height="34" rx="4" fill="#EAF4F6" stroke="#08748C"/><text x="404" y="140" font-size="11" fill="#065A6E" text-anchor="middle">8bit</text>
  <rect x="528" y="118" width="240" height="34" rx="4" fill="#EAF4F6" stroke="#08748C"/><text x="648" y="140" font-size="11" fill="#065A6E" text-anchor="middle">8bit</text>

  <line x1="404" y1="156" x2="404" y2="184" stroke="#08748C" stroke-width="1.6" marker-end="url(#bar)"/>
  <text x="470" y="176" font-size="11" fill="#8A9BA8">6비트씩 4조각으로 재분할</text>

  <!-- 6bit -->
  <text x="40" y="212" font-size="12" font-weight="700" fill="#3E5060">Base64 — 6비트 단위 (4문자 = 24비트, 안전한 64문자만)</text>
  <rect x="40" y="222" width="178" height="34" rx="4" fill="#DFF0E8" stroke="#2E8B6B"/><text x="129" y="244" font-size="11" fill="#1F6B4E" text-anchor="middle">6bit → 1문자</text>
  <rect x="222" y="222" width="178" height="34" rx="4" fill="#DFF0E8" stroke="#2E8B6B"/><text x="311" y="244" font-size="11" fill="#1F6B4E" text-anchor="middle">6bit → 1문자</text>
  <rect x="404" y="222" width="178" height="34" rx="4" fill="#DFF0E8" stroke="#2E8B6B"/><text x="493" y="244" font-size="11" fill="#1F6B4E" text-anchor="middle">6bit → 1문자</text>
  <rect x="586" y="222" width="182" height="34" rx="4" fill="#DFF0E8" stroke="#2E8B6B"/><text x="677" y="244" font-size="11" fill="#1F6B4E" text-anchor="middle">6bit → 1문자</text>

  <text x="40" y="292" font-size="11.5" fill="#8A9BA8">3바이트(24비트) → 4문자 = 8÷6 ≈ 33% 증가. Base128은 제어 문자가 섞여 위험, Base64가 안전+효율의 최적점.</text>
  <text x="40" y="314" font-size="11.5" fill="#8A9BA8">33%는 낭비가 아니라 "어떤 텍스트 시스템을 거쳐도 안 깨지는" 호환성의 대가. (URL에선 +,/ 때문에 URL-safe Base64)</text>
</svg>
