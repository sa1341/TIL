<svg viewBox="0 0 860 430" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="elar" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8A9BA8"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="430" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">ELB — ALB(L7) vs NLB(L4)</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">ALB는 요청 내용(경로·호스트)을 보고 라우팅 · NLB는 IP·포트만 보고 초고속 전달 · 뒤에는 타깃 그룹이 연결됨</text>

  <!-- ALB -->
  <rect x="40" y="92" width="380" height="310" rx="12" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="60" y="116" font-size="14.5" font-weight="700" fill="#065A6E">ALB (Application LB) · L7</text>
  <text x="60" y="136" font-size="11" fill="#8A9BA8">HTTP/HTTPS · 콘텐츠 기반 라우팅</text>

  <rect x="150" y="150" width="160" height="40" rx="8" fill="#ffffff" stroke="#08748C"/>
  <text x="230" y="175" font-size="12" fill="#065A6E" text-anchor="middle" font-weight="700">ALB</text>
  <text x="60" y="175" font-size="11.5" fill="#3E5060">요청 →</text>

  <!-- routing by path -->
  <line x1="230" y1="190" x2="150" y2="228" stroke="#8A9BA8" stroke-width="1.4" marker-end="url(#elar)"/>
  <line x1="230" y1="190" x2="310" y2="228" stroke="#8A9BA8" stroke-width="1.4" marker-end="url(#elar)"/>
  <text x="230" y="212" font-size="10" fill="#8A9BA8" text-anchor="middle">경로로 분기</text>
  <rect x="66" y="230" width="150" height="52" rx="8" fill="#ffffff" stroke="#B7D5DC"/>
  <text x="141" y="250" font-size="11" fill="#17212B" text-anchor="middle">/order/*</text>
  <text x="141" y="269" font-size="10.5" fill="#8A9BA8" text-anchor="middle">주문 서버 그룹</text>
  <rect x="240" y="230" width="150" height="52" rx="8" fill="#ffffff" stroke="#B7D5DC"/>
  <text x="315" y="250" font-size="11" fill="#17212B" text-anchor="middle">/pay/*</text>
  <text x="315" y="269" font-size="10.5" fill="#8A9BA8" text-anchor="middle">결제 서버 그룹</text>

  <text x="60" y="316" font-size="11.5" fill="#065A6E" font-weight="700">특징</text>
  <text x="60" y="336" font-size="11" fill="#3E5060">· 경로/호스트/헤더 기반 라우팅</text>
  <text x="60" y="354" font-size="11" fill="#3E5060">· 마이크로서비스에 적합</text>
  <text x="60" y="372" font-size="11" fill="#3E5060">· Lambda도 타깃으로 연결 가능</text>
  <text x="60" y="390" font-size="11" fill="#3E5060">· L7이라 상대적으로 느리고 기능 풍부</text>

  <!-- NLB -->
  <rect x="440" y="92" width="380" height="310" rx="12" fill="#FCF5F4" stroke="#B83227" stroke-width="1.6"/>
  <text x="460" y="116" font-size="14.5" font-weight="700" fill="#B83227">NLB (Network LB) · L4</text>
  <text x="460" y="136" font-size="11" fill="#8A9BA8">TCP/UDP · IP·포트 기반 전달</text>

  <rect x="550" y="150" width="160" height="40" rx="8" fill="#ffffff" stroke="#B83227"/>
  <text x="630" y="175" font-size="12" fill="#B83227" text-anchor="middle" font-weight="700">NLB</text>
  <text x="460" y="175" font-size="11.5" fill="#3E5060">요청 →</text>
  <line x1="630" y1="190" x2="550" y2="228" stroke="#8A9BA8" stroke-width="1.4" marker-end="url(#elar)"/>
  <line x1="630" y1="190" x2="710" y2="228" stroke="#8A9BA8" stroke-width="1.4" marker-end="url(#elar)"/>
  <text x="630" y="212" font-size="10" fill="#8A9BA8" text-anchor="middle">포트로 전달</text>
  <rect x="466" y="230" width="150" height="52" rx="8" fill="#ffffff" stroke="#E3B5AE"/>
  <text x="541" y="255" font-size="10.5" fill="#8A9BA8" text-anchor="middle">대상 서버</text>
  <rect x="640" y="230" width="150" height="52" rx="8" fill="#ffffff" stroke="#E3B5AE"/>
  <text x="715" y="255" font-size="10.5" fill="#8A9BA8" text-anchor="middle">대상 서버</text>

  <text x="460" y="316" font-size="11.5" fill="#B83227" font-weight="700">특징</text>
  <text x="460" y="336" font-size="11" fill="#3E5060">· 초고성능·초저지연 (수백만 RPS)</text>
  <text x="460" y="354" font-size="11" fill="#3E5060">· 고정 IP 제공 가능</text>
  <text x="460" y="372" font-size="11" fill="#3E5060">· TCP/UDP 레벨이라 내용은 못 봄</text>
  <text x="460" y="390" font-size="11" fill="#3E5060">· 극한 성능이 필요할 때 선택</text>
</svg>
