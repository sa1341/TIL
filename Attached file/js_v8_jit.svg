<svg width="840" height="360" viewBox="0 0 840 360" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="v8ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
    <marker id="v8hot" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#B83227"/></marker>
  </defs>
  <rect x="0" y="0" width="840" height="360" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">V8 엔진 — 인터프리터 + JIT 컴파일</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">소스를 바로 실행(인터프리터)하되, 자주 실행되는 코드(hot)는 JIT로 기계어 최적화 → 빠른 실행</text>

  <!-- source -->
  <rect x="30" y="110" width="120" height="50" rx="8" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="90" y="132" font-size="11.5" font-weight="700" fill="#8A5E12" text-anchor="middle">JS 소스</text>
  <text x="90" y="150" font-size="9.5" fill="#8A9BA8" text-anchor="middle">텍스트</text>
  <line x1="150" y1="135" x2="186" y2="135" stroke="#08748C" stroke-width="1.6" marker-end="url(#v8ar)"/>

  <!-- parser -->
  <rect x="190" y="110" width="120" height="50" rx="8" fill="#EAF4F6" stroke="#08748C"/>
  <text x="250" y="132" font-size="11.5" font-weight="700" fill="#065A6E" text-anchor="middle">파서 → AST</text>
  <text x="250" y="150" font-size="9.5" fill="#8A9BA8" text-anchor="middle">구문 트리</text>
  <line x1="310" y1="135" x2="346" y2="135" stroke="#08748C" stroke-width="1.6" marker-end="url(#v8ar)"/>

  <!-- interpreter -->
  <rect x="350" y="110" width="150" height="50" rx="8" fill="#EAF4F6" stroke="#08748C"/>
  <text x="425" y="130" font-size="11.5" font-weight="700" fill="#065A6E" text-anchor="middle">인터프리터 (Ignition)</text>
  <text x="425" y="148" font-size="9.5" fill="#8A9BA8" text-anchor="middle">바이트코드로 즉시 실행</text>
  <line x1="500" y1="135" x2="536" y2="135" stroke="#08748C" stroke-width="1.6" marker-end="url(#v8ar)"/>

  <!-- run -->
  <rect x="540" y="110" width="120" height="50" rx="8" fill="#DFF0E8" stroke="#2E8B6B"/>
  <text x="600" y="132" font-size="11.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">실행</text>
  <text x="600" y="150" font-size="9.5" fill="#8A9BA8" text-anchor="middle">결과 산출</text>

  <!-- profiler / hot path -->
  <rect x="350" y="210" width="150" height="54" rx="8" fill="#FCF5F4" stroke="#B83227"/>
  <text x="425" y="232" font-size="11" font-weight="700" fill="#B83227" text-anchor="middle">프로파일러</text>
  <text x="425" y="250" font-size="9.5" fill="#8A9BA8" text-anchor="middle">자주 실행되는 코드(hot) 감지</text>
  <line x1="425" y1="160" x2="425" y2="208" stroke="#B83227" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#v8hot)"/>

  <line x1="500" y1="237" x2="546" y2="237" stroke="#B83227" stroke-width="1.6" marker-end="url(#v8hot)"/>
  <rect x="550" y="210" width="180" height="54" rx="8" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="640" y="232" font-size="11" font-weight="700" fill="#8A5E12" text-anchor="middle">JIT 컴파일러 (TurboFan)</text>
  <text x="640" y="250" font-size="9.5" fill="#8A9BA8" text-anchor="middle">hot 코드를 최적화 기계어로 컴파일</text>
  <line x1="640" y1="210" x2="620" y2="164" stroke="#C88A2E" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#v8ar)"/>
  <text x="655" y="190" font-size="9" fill="#8A9BA8">더 빠르게 재실행</text>

  <text x="32" y="308" font-size="11" fill="#8A9BA8">즉, 처음엔 인터프리터로 빠르게 시작하고, 반복 실행되는 부분만 골라 기계어로 최적화한다(적응형 최적화).</text>
  <text x="32" y="328" font-size="11" fill="#8A9BA8">가정이 깨지면(타입 변화 등) 최적화를 되돌리는 역최적화(deoptimization)도 일어난다.</text>
</svg>
