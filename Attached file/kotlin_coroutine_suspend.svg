<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="csar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#2E8B6B"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="420" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">코루틴 suspend / resume — 스레드를 막지 않는 일시 중단</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">suspend 지점에서 코루틴은 멈추지만 스레드는 반납됨 → 스레드는 다른 일 처리 → 작업이 끝나면 resume</text>

  <!-- Blocking (bad) -->
  <text x="60" y="104" font-size="13.5" font-weight="700" fill="#B83227">일반 blocking 호출</text>
  <rect x="60" y="116" width="740" height="52" rx="8" fill="#FCF5F4" stroke="#B83227" stroke-width="1.4"/>
  <rect x="72" y="128" width="150" height="28" rx="5" fill="#F4E4E1" stroke="#B83227"/><text x="147" y="147" font-size="10.5" fill="#B83227" text-anchor="middle">작업 실행</text>
  <rect x="230" y="128" width="360" height="28" rx="5" fill="#F4E4E1" stroke="#B83227" stroke-dasharray="4,3"/><text x="410" y="147" font-size="10.5" fill="#B83227" text-anchor="middle">I/O 대기 — 스레드가 그대로 묶여 놀고 있음 😵</text>
  <rect x="598" y="128" width="190" height="28" rx="5" fill="#F4E4E1" stroke="#B83227"/><text x="693" y="147" font-size="10.5" fill="#B83227" text-anchor="middle">이어서 실행</text>

  <!-- Coroutine (good) -->
  <text x="60" y="212" font-size="13.5" font-weight="700" fill="#2E8B6B">코루틴 suspend</text>
  <rect x="60" y="224" width="740" height="120" rx="8" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.4"/>
  <text x="74" y="245" font-size="11" fill="#1F6B4E">코루틴 A</text>
  <rect x="120" y="234" width="130" height="26" rx="5" fill="#ffffff" stroke="#2E8B6B"/><text x="185" y="252" font-size="10" fill="#1F6B4E" text-anchor="middle">작업 실행</text>
  <text x="256" y="252" font-size="16" fill="#C88A2E">⏸</text>
  <text x="274" y="248" font-size="9.5" fill="#8A5E12">suspend</text>
  <rect x="600" y="234" width="130" height="26" rx="5" fill="#ffffff" stroke="#2E8B6B"/><text x="665" y="252" font-size="10" fill="#1F6B4E" text-anchor="middle">resume 후 계속</text>
  <line x1="256" y1="278" x2="600" y2="278" stroke="#2E8B6B" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#csar)"/>
  <text x="428" y="273" font-size="9.5" fill="#8A9BA8" text-anchor="middle">A는 중단 상태 (스레드 점유 안 함)</text>

  <text x="74" y="308" font-size="11" fill="#065A6E">스레드</text>
  <rect x="120" y="298" width="130" height="26" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="185" y="316" font-size="10" fill="#065A6E" text-anchor="middle">코루틴 A 실행</text>
  <rect x="256" y="298" width="344" height="26" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="428" y="316" font-size="10" fill="#065A6E" text-anchor="middle">그 사이 코루틴 B·C 등 다른 작업 처리 🙂</text>
  <rect x="600" y="298" width="130" height="26" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="665" y="316" font-size="10" fill="#065A6E" text-anchor="middle">A 재개 실행</text>

  <text x="60" y="378" font-size="11.5" fill="#8A9BA8">덕분에 적은 수의 스레드로도 수많은 동시 작업을 효율적으로 처리할 수 있다 (경량 스레드).</text>
  <text x="60" y="398" font-size="11.5" fill="#8A9BA8">suspend 함수는 이런 "중단·재개" 지점을 가질 수 있는 함수를 뜻한다.</text>
</svg>
