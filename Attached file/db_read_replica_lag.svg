<svg width="860" height="360" viewBox="0 0 860 360" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="rrar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="360" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">리드 레플리카의 함정 — 방금 쓴 글이 안 보인다</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">마스터→레플리카는 비동기 복제. 쓴 직후 레플리카로 읽으면 아직 반영 전</text>

  <rect x="40" y="100" width="150" height="56" rx="10" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="115" y="124" font-size="12.5" font-weight="700" fill="#8A5E12" text-anchor="middle">쓰기 마스터</text>
  <text x="115" y="143" font-size="10" fill="#8A9BA8" text-anchor="middle">글 작성 (즉시 반영)</text>

  <line x1="190" y1="128" x2="320" y2="128" stroke="#08748C" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#rrar)"/>
  <text x="255" y="118" font-size="10" fill="#B83227" text-anchor="middle">비동기 복제 (지연)</text>

  <rect x="322" y="100" width="150" height="56" rx="10" fill="#EAF4F6" stroke="#08748C"/>
  <text x="397" y="124" font-size="12.5" font-weight="700" fill="#065A6E" text-anchor="middle">읽기 레플리카</text>
  <text x="397" y="143" font-size="10" fill="#B83227" text-anchor="middle">아직 반영 전 ✗</text>

  <rect x="540" y="100" width="280" height="56" rx="10" fill="#FCF5F4" stroke="#E0B4AD"/>
  <text x="680" y="124" font-size="11.5" fill="#B83227" text-anchor="middle">사용자: 글 쓴 직후 새로고침</text>
  <text x="680" y="143" font-size="10.5" fill="#8A9BA8" text-anchor="middle">→ 레플리카로 라우팅 → 자기 글 안 보임</text>

  <rect x="40" y="184" width="780" height="66" rx="10" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.4"/>
  <text x="430" y="208" font-size="12.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">해결 — 데이터별 일관성 등급</text>
  <text x="58" y="230" font-size="11" fill="#5A6B78">· 쓴 직후 본인 화면: 짧은 윈도우는 마스터에서 읽기(read-your-writes) — 강한 일관성</text>
  <text x="58" y="248" font-size="11" fill="#5A6B78">· 인기글 목록: 몇 초 지연 허용 — 한 가지 정책으로 모든 데이터를 다루지 않는다</text>

  <text x="40" y="284" font-size="11.5" fill="#8A9BA8">한계: 사용자 인지가 인스턴스 간 공유 안 되면(A서버 쓰고 B서버 읽기) 다시 레플리카를 탄다.</text>
  <text x="40" y="308" font-size="11.5" fill="#8A9BA8">리드 레플리카는 읽기 분산일 뿐, 일관성을 보장하지 않는다.</text>
</svg>
