<svg width="820" height="380" viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect x="0" y="0" width="820" height="380" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">지연 초기화 — lateinit vs by lazy</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">둘 다 "쓰기 직전까지 초기화를 미루는" 방법이지만, 변경 가능성·초기화 시점·용도가 다르다</text>

  <!-- lateinit -->
  <rect x="40" y="92" width="360" height="256" rx="12" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="60" y="118" font-size="15" font-weight="700" fill="#065A6E">lateinit var</text>
  <text x="60" y="140" font-size="11" fill="#8A9BA8">개발자가 "나중에 직접" 초기화</text>
  <rect x="60" y="152" width="320" height="26" rx="4" fill="#ffffff" stroke="#B7D5DC"/><text x="72" y="170" font-size="10.5" fill="#3E5060">lateinit var name: String</text>
  <text x="60" y="200" font-size="11.5" fill="#17212B">• <tspan font-weight="700">var</tspan> 에만 사용 (변경 가능)</text>
  <text x="60" y="224" font-size="11.5" fill="#17212B">• 원시 타입(Int 등) 불가, non-null 타입만</text>
  <text x="60" y="248" font-size="11.5" fill="#17212B">• 초기화 시점을 개발자가 직접 결정</text>
  <text x="60" y="272" font-size="11.5" fill="#B83227">• 초기화 전 접근 시 예외 발생</text>
  <text x="60" y="286" font-size="10.5" fill="#8A9BA8">  (UninitializedPropertyAccessException)</text>
  <text x="60" y="318" font-size="11" fill="#3E5060" font-weight="700">용도: DI 주입·테스트 setup 등</text>
  <text x="60" y="336" font-size="10.5" fill="#8A9BA8">외부에서 값이 채워지는 프로퍼티</text>

  <!-- by lazy -->
  <rect x="420" y="92" width="360" height="256" rx="12" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="440" y="118" font-size="15" font-weight="700" fill="#8A5E12">by lazy</text>
  <text x="440" y="140" font-size="11" fill="#8A9BA8">"최초 접근 시 자동으로" 1회 초기화</text>
  <rect x="440" y="152" width="320" height="26" rx="4" fill="#ffffff" stroke="#E5DCC7"/><text x="452" y="170" font-size="10.5" fill="#3E5060">val conn by lazy { createConn() }</text>
  <text x="440" y="200" font-size="11.5" fill="#17212B">• <tspan font-weight="700">val</tspan> 에만 사용 (불변)</text>
  <text x="440" y="224" font-size="11.5" fill="#17212B">• 원시 타입 포함 모든 타입 가능</text>
  <text x="440" y="248" font-size="11.5" fill="#17212B">• 첫 접근 시 람다 실행 → 값 캐싱</text>
  <text x="440" y="272" font-size="11.5" fill="#1F6B4E">• 기본 thread-safe (SYNCHRONIZED)</text>
  <text x="440" y="286" font-size="10.5" fill="#8A9BA8">  이후 접근은 캐싱된 값 반환</text>
  <text x="440" y="318" font-size="11" fill="#3E5060" font-weight="700">용도: 무겁고 한 번만 계산할 값</text>
  <text x="440" y="336" font-size="10.5" fill="#8A9BA8">생성 비용 큰 객체의 지연 생성</text>
</svg>
