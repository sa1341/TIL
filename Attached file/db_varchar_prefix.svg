<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect x="0" y="0" width="860" height="340" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">VARCHAR 255/85/63 — 문자셋별 1바이트 프리픽스 경계</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">길이 프리픽스가 1바이트(≤255)면 저렴. N은 바이트가 아니라 문자 수 → 글자당 바이트가 관건</text>

  <rect x="40" y="94" width="240" height="30" rx="4" fill="#EAF4F6" stroke="#08748C"/><text x="160" y="114" font-size="11" fill="#065A6E" text-anchor="middle">길이 프리픽스 (1B) | 데이터 …</text>
  <text x="300" y="114" font-size="11" fill="#8A9BA8">1바이트면 0~255까지 표현 가능</text>

  <rect x="40" y="140" width="780" height="120" rx="10" fill="#F7FAFB" stroke="#B7D5DC"/>
  <text x="56" y="164" font-size="12" font-weight="700" fill="#3E5060">1바이트 프리픽스에 들어가는 최대 문자 수</text>
  <rect x="60" y="176" width="240" height="32" rx="5" fill="#DFF0E8" stroke="#2E8B6B"/><text x="180" y="197" font-size="11" fill="#1F6B4E" text-anchor="middle">latin1 (1B/자) → 255</text>
  <rect x="310" y="176" width="240" height="32" rx="5" fill="#FBF3E4" stroke="#C88A2E"/><text x="430" y="197" font-size="11" fill="#8A5E12" text-anchor="middle">utf8mb3 (3B/자) → 85</text>
  <rect x="560" y="176" width="240" height="32" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="680" y="197" font-size="11" fill="#065A6E" text-anchor="middle">utf8mb4 (4B/자) → 63</text>
  <text x="60" y="232" font-size="10.8" fill="#5A6B78">utf8mb4에서 VARCHAR(63)=252B(≤255, 1B) · VARCHAR(64)=256B(초과) → 프리픽스 2바이트로 증가</text>
  <text x="60" y="250" font-size="10.8" fill="#B83227">✗ 1억 행이면 +100MB · 인덱스 키도 커져 B-Tree 페이지 스플릿 잦아짐</text>

  <text x="32" y="290" font-size="11.5" fill="#8A9BA8">VARCHAR(255)는 latin1 시절 최적값. PostgreSQL은 varlena 구조라 255/256 경계 자체가 없음.</text>
  <text x="32" y="312" font-size="11.5" fill="#8A9BA8">정답은 데이터 도메인이 결정하는 것이지 관습이 결정하는 게 아니다.</text>
</svg>
