<svg viewBox="0 0 860 360" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect x="0" y="0" width="860" height="360" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">카프카 파티션 — 늘리기만 되고 줄이기는 막힌 이유</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">각 파티션은 독립적으로 0부터 증가하는 오프셋 시퀀스를 가진다</text>

  <!-- partitions -->
  <text x="40" y="102" font-size="12" font-weight="700" fill="#3E5060">토픽 = 여러 append-only 로그(파티션)</text>
  <rect x="40" y="112" width="360" height="40" rx="6" fill="#EAF4F6" stroke="#08748C"/>
  <text x="58" y="137" font-size="11" fill="#065A6E">P0:</text><text x="120" y="137" font-size="11" fill="#5A6B78" font-family="monospace">0 · 1 · 2 · 3 · 4 …</text>
  <rect x="40" y="158" width="360" height="40" rx="6" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="58" y="183" font-size="11" fill="#8A5E12">P1:</text><text x="120" y="183" font-size="11" fill="#5A6B78" font-family="monospace">0 · 1 · 2 · 3 …</text>
  <rect x="40" y="204" width="360" height="40" rx="6" fill="#FCF5F4" stroke="#B83227"/>
  <text x="58" y="229" font-size="11" fill="#B83227">P2:</text><text x="120" y="229" font-size="11" fill="#5A6B78" font-family="monospace">0 · 1 · 2 …</text>

  <!-- decrease blocked -->
  <rect x="430" y="112" width="398" height="66" rx="10" fill="#FCF5F4" stroke="#B83227" stroke-width="1.4"/>
  <text x="629" y="134" font-size="13" font-weight="700" fill="#B83227" text-anchor="middle">줄이기 ✗ (설계로 금지)</text>
  <text x="448" y="156" font-size="10.8" fill="#5A6B78">P2를 없애면 그 메시지는? 두 로그를 합치면</text>
  <text x="448" y="172" font-size="10.8" fill="#5A6B78">오프셋이 겹쳐 → 어디까지 읽었는지 추적 불가</text>

  <rect x="430" y="188" width="398" height="56" rx="10" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.4"/>
  <text x="629" y="210" font-size="13" font-weight="700" fill="#1F6B4E" text-anchor="middle">늘리기 ✓ (빈 파티션 추가)</text>
  <text x="448" y="232" font-size="10.8" fill="#5A6B78">기존 데이터·오프셋 손 안 댐 · 단 hash(key)%N의 N이 바뀜</text>

  <text x="40" y="286" font-size="11.5" fill="#8A9BA8">늘리기도 공짜 아님: N이 바뀌면 같은 키의 파티션 배정이 달라져 순서가 어긋날 수 있다.</text>
  <text x="40" y="312" font-size="11.5" fill="#8A9BA8">파티션 수는 한 번 정하면 사실상 되돌릴 수 없는 거의 유일한 결정 — 토픽 생성 시 신중히.</text>
</svg>
