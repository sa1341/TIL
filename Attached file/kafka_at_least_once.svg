<svg width="860" height="350" viewBox="0 0 860 350" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="kar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="350" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">카프카 at-least-once — 알림이 두 번 간 이유</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">처리(②)와 오프셋 커밋(③) 사이에 죽으면, 다른 컨슈머가 같은 메시지를 다시 가져간다</text>

  <!-- flow -->
  <rect x="40" y="100" width="200" height="44" rx="8" fill="#EAF4F6" stroke="#08748C"/>
  <text x="140" y="127" font-size="11.5" fill="#065A6E" text-anchor="middle">① 메시지 수신</text>
  <line x1="240" y1="122" x2="290" y2="122" stroke="#08748C" stroke-width="1.5" marker-end="url(#kar)"/>
  <rect x="292" y="100" width="200" height="44" rx="8" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="392" y="127" font-size="11.5" fill="#8A5E12" text-anchor="middle">② 처리 (알림 발송)</text>
  <line x1="492" y1="122" x2="542" y2="122" stroke="#08748C" stroke-width="1.5" marker-end="url(#kar)"/>
  <rect x="544" y="100" width="200" height="44" rx="8" fill="#DFF0E8" stroke="#2E8B6B"/>
  <text x="644" y="127" font-size="11.5" fill="#1F6B4E" text-anchor="middle">③ 오프셋 커밋</text>

  <!-- danger between 2 and 3 -->
  <line x1="518" y1="90" x2="518" y2="160" stroke="#B83227" stroke-width="1.4" stroke-dasharray="3,3"/>
  <text x="518" y="184" font-size="11" font-weight="700" fill="#B83227" text-anchor="middle">⚡ ②~③ 사이 컨슈머 죽음</text>
  <text x="518" y="204" font-size="10.5" fill="#8A9BA8" text-anchor="middle">브로커: "아직 미처리"로 판단 → 리밸런싱 후 재처리 → 알림 한 번 더</text>

  <rect x="40" y="228" width="380" height="94" rx="10" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.4"/>
  <text x="230" y="252" font-size="12.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">해결: 컨슈머 멱등성</text>
  <text x="58" y="276" font-size="10.8" fill="#5A6B78">같은 메시지 두 번 와도 결과가 한 번과 같도록</text>
  <text x="58" y="298" font-size="10.8" fill="#5A6B78">(처리 이력 저장·유니크 키 등)</text>
  <text x="58" y="316" font-size="10.5" fill="#8A9BA8">메시지 큐 = 중복을 처리할 책임을 컨슈머가 진다</text>

  <rect x="440" y="228" width="380" height="94" rx="10" fill="#FCF5F4" stroke="#E0B4AD" stroke-width="1.4"/>
  <text x="630" y="252" font-size="12.5" font-weight="700" fill="#B83227" text-anchor="middle">EOS로 끝? — 범위가 좁다</text>
  <text x="458" y="276" font-size="10.8" fill="#5A6B78">Exactly-Once는 카프카→카프카 안에서만</text>
  <text x="458" y="296" font-size="10.8" fill="#5A6B78">(Kafka Streams). 외부 DB·API·메일은 밖</text>
  <text x="458" y="316" font-size="10.5" fill="#8A9BA8">DB+오프셋 함께 묶으려면 Outbox 패턴 필요</text>
</svg>
