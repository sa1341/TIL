<svg width="860" height="466" viewBox="0 0 860 466" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="svar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#8A9BA8"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="466" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">Service 타입 — ClusterIP · NodePort · LoadBalancer</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">라벨 셀렉터로 대상 Pod를 찾아 트래픽을 분산 · 상위 타입은 하위 타입을 자동으로 포함한다.</text>

  <!-- Row 1: ClusterIP -->
  <rect x="40" y="88" width="124" height="52" rx="9" fill="#08748C"/>
  <text x="102" y="110" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">ClusterIP</text>
  <text x="102" y="128" font-size="9.5" fill="#CDE8ED" text-anchor="middle">기본 · 내부 전용</text>

  <rect x="180" y="90" width="130" height="48" rx="8" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="245" y="112" font-size="11" fill="#065A6E" text-anchor="middle">내부 Pod</text>
  <text x="245" y="127" font-size="9.5" fill="#5A6B78" text-anchor="middle">(클라이언트)</text>
  <line x1="310" y1="114" x2="352" y2="114" stroke="#8A9BA8" stroke-width="1.5" marker-end="url(#svar)"/>

  <rect x="354" y="90" width="150" height="48" rx="8" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="429" y="110" font-size="11" font-weight="700" fill="#065A6E" text-anchor="middle">Service (ClusterIP)</text>
  <text x="429" y="126" font-size="9.5" fill="#5A6B78" text-anchor="middle">내부 가상 IP</text>
  <line x1="504" y1="114" x2="546" y2="114" stroke="#8A9BA8" stroke-width="1.5" marker-end="url(#svar)"/>

  <rect x="548" y="90" width="150" height="48" rx="8" fill="#F4F6F7" stroke="#B7D5DC" stroke-width="1.4"/>
  <text x="623" y="118" font-size="11" fill="#3E5060" text-anchor="middle">대상 Pod × N</text>

  <text x="180" y="158" font-size="10.5" fill="#8A9BA8">클러스터 내부 전용 가상 IP — 외부에서 접근 불가. Pod가 사라져도 바뀌지 않는 고정 진입점.</text>

  <line x1="40" y1="176" x2="820" y2="176" stroke="#ECF1F3"/>

  <!-- Row 2: NodePort -->
  <rect x="40" y="190" width="124" height="52" rx="9" fill="#C88A2E"/>
  <text x="102" y="212" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">NodePort</text>
  <text x="102" y="230" font-size="9.5" fill="#F6E6C8" text-anchor="middle">노드 포트 개방</text>

  <rect x="180" y="192" width="130" height="48" rx="8" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="245" y="214" font-size="11" fill="#8A5E12" text-anchor="middle">외부 클라이언트</text>
  <text x="245" y="229" font-size="9.5" fill="#8A9BA8" text-anchor="middle">노드 IP:포트</text>
  <line x1="310" y1="216" x2="352" y2="216" stroke="#8A9BA8" stroke-width="1.5" marker-end="url(#svar)"/>

  <rect x="354" y="192" width="150" height="48" rx="8" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="429" y="212" font-size="11" font-weight="700" fill="#8A5E12" text-anchor="middle">Node : 30000~32767</text>
  <text x="429" y="228" font-size="9.5" fill="#5A6B78" text-anchor="middle">모든 노드 같은 포트</text>
  <line x1="504" y1="216" x2="546" y2="216" stroke="#8A9BA8" stroke-width="1.5" marker-end="url(#svar)"/>
  <text x="525" y="208" font-size="8.5" fill="#8A9BA8" text-anchor="middle">ClusterIP 경유</text>

  <rect x="548" y="192" width="150" height="48" rx="8" fill="#F4F6F7" stroke="#B7D5DC" stroke-width="1.4"/>
  <text x="623" y="220" font-size="11" fill="#3E5060" text-anchor="middle">대상 Pod × N</text>

  <text x="180" y="260" font-size="10.5" fill="#8A9BA8">모든 노드의 같은 포트를 열어 외부 노출. 노드 IP를 알아야 하고 포트 범위(30000~32767)가 제한적.</text>

  <line x1="40" y1="278" x2="820" y2="278" stroke="#ECF1F3"/>

  <!-- Row 3: LoadBalancer -->
  <rect x="40" y="292" width="124" height="52" rx="9" fill="#2E8B6B"/>
  <text x="102" y="314" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">LoadBalancer</text>
  <text x="102" y="332" font-size="9.5" fill="#CDE9DC" text-anchor="middle">클라우드 LB 연동</text>

  <rect x="180" y="294" width="130" height="48" rx="8" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.6"/>
  <text x="245" y="322" font-size="11" fill="#1F6B4E" text-anchor="middle">외부 클라이언트</text>
  <line x1="310" y1="318" x2="352" y2="318" stroke="#8A9BA8" stroke-width="1.5" marker-end="url(#svar)"/>

  <rect x="354" y="294" width="150" height="48" rx="8" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.6"/>
  <text x="429" y="314" font-size="11" font-weight="700" fill="#1F6B4E" text-anchor="middle">클라우드 LB</text>
  <text x="429" y="330" font-size="9.5" fill="#5A6B78" text-anchor="middle">AWS ELB / NLB</text>
  <line x1="504" y1="318" x2="546" y2="318" stroke="#8A9BA8" stroke-width="1.5" marker-end="url(#svar)"/>
  <text x="525" y="310" font-size="8.5" fill="#8A9BA8" text-anchor="middle">NodePort 경유</text>

  <rect x="548" y="294" width="150" height="48" rx="8" fill="#F4F6F7" stroke="#B7D5DC" stroke-width="1.4"/>
  <text x="623" y="322" font-size="11" fill="#3E5060" text-anchor="middle">대상 Pod × N</text>

  <text x="180" y="362" font-size="10.5" fill="#8A9BA8">클라우드 LB를 붙여 외부 노출. Service마다 LB가 하나씩 생겨 비용이 늘어난다.</text>

  <!-- containment note -->
  <rect x="716" y="88" width="112" height="254" rx="10" fill="#F7FAFB" stroke="#B7D5DC"/>
  <text x="772" y="112" font-size="10.5" font-weight="700" fill="#3E5060" text-anchor="middle">포함 관계</text>
  <rect x="728" y="124" width="88" height="196" rx="8" fill="#DFF0E8" stroke="#2E8B6B"/>
  <text x="772" y="140" font-size="9.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">LoadBalancer</text>
  <rect x="740" y="150" width="64" height="158" rx="7" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="772" y="166" font-size="9.5" font-weight="700" fill="#8A5E12" text-anchor="middle">NodePort</text>
  <rect x="750" y="176" width="44" height="124" rx="6" fill="#EAF4F6" stroke="#08748C"/>
  <text x="772" y="210" font-size="8.5" font-weight="700" fill="#065A6E" text-anchor="middle" transform="rotate(90 772 238)">ClusterIP</text>
  <text x="772" y="332" font-size="8.5" fill="#8A9BA8" text-anchor="middle">상위가 하위를 포함</text>

  <text x="40" y="398" font-size="11.5" fill="#8A9BA8">· <tspan font-weight="700" fill="#3E5060">Headless</tspan>(clusterIP: None): 로드밸런싱 없이 Pod IP를 직접 반환 — StatefulSet·DB·Kafka 등 개별 Pod 지목이 필요할 때.</text>
  <text x="40" y="420" font-size="11.5" fill="#8A9BA8">· <tspan font-weight="700" fill="#3E5060">ExternalName</tspan>: 클러스터 밖 도메인으로의 CNAME 별칭(프록시 아님) — 외부 서비스를 내부 이름으로 부를 때.</text>
  <text x="40" y="442" font-size="11.5" fill="#8A9BA8">· 실무에선 외부 노출을 Service마다 LB로 하지 않고, <tspan font-weight="700" fill="#08748C">Ingress/Gateway</tspan>(L7)를 앞단에 두고 뒤는 ClusterIP로 두는 패턴이 지배적.</text>
</svg>
