<svg width="860" height="380" viewBox="0 0 860 380" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect x="0" y="0" width="860" height="380" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">비관적 락 vs 낙관적 락 — 충돌 빈도가 선택을 결정</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">충돌이 드물면 낙관적, 잦으면 비관적</text>

  <!-- Pessimistic -->
  <rect x="32" y="92" width="390" height="238" rx="12" fill="#FCF5F4" stroke="#B83227" stroke-width="1.6"/>
  <text x="227" y="118" font-size="15" font-weight="700" fill="#B83227" text-anchor="middle">비관적 락 (Pessimistic)</text>
  <text x="227" y="138" font-size="11" fill="#8A9BA8" text-anchor="middle">"충돌 날 거야" · SELECT … FOR UPDATE</text>
  <text x="52" y="166" font-size="11.5" fill="#5A6B78">· 읽을 때부터 배타 락으로 잠금</text>
  <text x="52" y="188" font-size="11.5" fill="#5A6B78">· 다른 트랜잭션은 끝날 때까지 대기</text>
  <text x="52" y="210" font-size="11.5" fill="#5A6B78">· 확실하지만 한 번에 하나씩</text>
  <rect x="52" y="228" width="350" height="30" rx="5" fill="#F6E4E1"/><text x="227" y="248" font-size="11" fill="#B83227" text-anchor="middle">동시 처리량 ↓ · 대기 발생</text>
  <rect x="52" y="270" width="350" height="44" rx="6" fill="#DFF0E8" stroke="#A9D5BF"/>
  <text x="227" y="290" font-size="11" font-weight="700" fill="#1F6B4E" text-anchor="middle">충돌 잦은 환경에서 유리</text>
  <text x="227" y="307" font-size="10" fill="#5A6B78" text-anchor="middle">선착순 이벤트 등 → 줄 세우기가 오히려 빠름</text>

  <!-- Optimistic -->
  <rect x="438" y="92" width="390" height="238" rx="12" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.6"/>
  <text x="633" y="118" font-size="15" font-weight="700" fill="#1F6B4E" text-anchor="middle">낙관적 락 (Optimistic)</text>
  <text x="633" y="138" font-size="11" fill="#8A9BA8" text-anchor="middle">"충돌 드물 거야" · version 확인</text>
  <text x="458" y="166" font-size="11.5" fill="#5A6B78">· 잠그지 않고 진행, 수정 시 버전 확인</text>
  <text x="458" y="188" font-size="11.5" fill="#5A6B78">· 버전 바뀌었으면 UPDATE 0행 → 재시도</text>
  <text x="458" y="210" font-size="11.5" fill="#5A6B78">· 락 없으니 대기 없음</text>
  <rect x="458" y="228" width="350" height="30" rx="5" fill="#CDE9DC"/><text x="633" y="248" font-size="11" fill="#1F6B4E" text-anchor="middle">처리량 ↑ · 첫 시도 대부분 성공</text>
  <rect x="458" y="270" width="350" height="44" rx="6" fill="#FCF5F4" stroke="#E0B4AD"/>
  <text x="633" y="290" font-size="11" font-weight="700" fill="#B83227" text-anchor="middle">충돌 잦으면 역전</text>
  <text x="633" y="307" font-size="10" fill="#5A6B78" text-anchor="middle">재시도가 재시도를 부름 (100명에 쿼리 5000번)</text>

  <text x="32" y="356" font-size="11.5" fill="#8A9BA8">JPA에서는 @Lock 어노테이션으로 둘을 쉽게 전환할 수 있다.</text>
</svg>
