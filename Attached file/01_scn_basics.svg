<svg viewBox="0 0 840 440" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="ar1" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#3E5060"/>
    </marker>
    <marker id="arUp" markerWidth="9" markerHeight="9" refX="4.5" refY="1" orient="auto">
      <path d="M0,9 L4.5,0 L9,9 Z" fill="#C88A2E"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="840" height="440" fill="#ffffff"/>
  <text x="32" y="42" font-size="21" font-weight="700" fill="#17212B">SCN은 커밋(commit)할 때만 증가한다</text>
  <text x="32" y="66" font-size="13.5" fill="#8A9BA8">조회(SELECT)만으로는 SCN이 오르지 않는다 · SCN = System Change Number</text>

  <!-- timeline -->
  <line x1="60" y1="150" x2="800" y2="150" stroke="#3E5060" stroke-width="2" marker-end="url(#ar1)"/>
  <text x="790" y="140" font-size="12" fill="#8A9BA8" text-anchor="end">시간 →</text>

  <!-- event ticks -->
  <!-- A: SELECT -->
  <g>
    <line x1="150" y1="140" x2="150" y2="160" stroke="#3E5060" stroke-width="1.5"/>
    <rect x="108" y="96" width="84" height="34" rx="6" fill="#F4F7F9" stroke="#D4DCE2"/>
    <text x="150" y="112" font-size="12.5" fill="#3E5060" text-anchor="middle" font-weight="600">SELECT</text>
    <text x="150" y="126" font-size="10.5" fill="#8A9BA8" text-anchor="middle">조회</text>
  </g>
  <!-- B: SELECT -->
  <g>
    <line x1="280" y1="140" x2="280" y2="160" stroke="#3E5060" stroke-width="1.5"/>
    <rect x="238" y="96" width="84" height="34" rx="6" fill="#F4F7F9" stroke="#D4DCE2"/>
    <text x="280" y="112" font-size="12.5" fill="#3E5060" text-anchor="middle" font-weight="600">SELECT</text>
    <text x="280" y="126" font-size="10.5" fill="#8A9BA8" text-anchor="middle">조회</text>
  </g>
  <!-- C: UPDATE+COMMIT -->
  <g>
    <line x1="430" y1="140" x2="430" y2="160" stroke="#C88A2E" stroke-width="2"/>
    <rect x="376" y="90" width="108" height="40" rx="6" fill="#FBF3E4" stroke="#C88A2E"/>
    <text x="430" y="106" font-size="12" fill="#8A5E12" text-anchor="middle" font-weight="700">UPDATE</text>
    <text x="430" y="121" font-size="11.5" fill="#C88A2E" text-anchor="middle" font-weight="700">+ COMMIT</text>
    <line x1="430" y1="150" x2="430" y2="212" stroke="#C88A2E" stroke-width="1.6" stroke-dasharray="3,3" marker-end="url(#arUp)"/>
  </g>
  <!-- D: SELECT -->
  <g>
    <line x1="560" y1="140" x2="560" y2="160" stroke="#3E5060" stroke-width="1.5"/>
    <rect x="518" y="96" width="84" height="34" rx="6" fill="#F4F7F9" stroke="#D4DCE2"/>
    <text x="560" y="112" font-size="12.5" fill="#3E5060" text-anchor="middle" font-weight="600">SELECT</text>
    <text x="560" y="126" font-size="10.5" fill="#8A9BA8" text-anchor="middle">조회</text>
  </g>
  <!-- E: INSERT+COMMIT -->
  <g>
    <line x1="700" y1="140" x2="700" y2="160" stroke="#C88A2E" stroke-width="2"/>
    <rect x="646" y="90" width="108" height="40" rx="6" fill="#FBF3E4" stroke="#C88A2E"/>
    <text x="700" y="106" font-size="12" fill="#8A5E12" text-anchor="middle" font-weight="700">INSERT</text>
    <text x="700" y="121" font-size="11.5" fill="#C88A2E" text-anchor="middle" font-weight="700">+ COMMIT</text>
    <line x1="700" y1="150" x2="700" y2="212" stroke="#C88A2E" stroke-width="1.6" stroke-dasharray="3,3" marker-end="url(#arUp)"/>
  </g>

  <!-- SCN counter track -->
  <text x="60" y="238" font-size="12.5" fill="#8A5E12" font-weight="700">SCN 카운터</text>
  <!-- step function: 100 until 430, then 101 until 700, then 102 -->
  <line x1="60"  y1="278" x2="430" y2="278" stroke="#C88A2E" stroke-width="3"/>
  <line x1="430" y1="278" x2="430" y2="258" stroke="#C88A2E" stroke-width="3"/>
  <line x1="430" y1="258" x2="700" y2="258" stroke="#C88A2E" stroke-width="3"/>
  <line x1="700" y1="258" x2="700" y2="238" stroke="#C88A2E" stroke-width="3"/>
  <line x1="700" y1="238" x2="800" y2="238" stroke="#C88A2E" stroke-width="3"/>

  <circle cx="150" cy="278" r="4" fill="#C88A2E"/>
  <circle cx="280" cy="278" r="4" fill="#C88A2E"/>
  <text x="150" y="300" font-size="13" fill="#8A5E12" text-anchor="middle" font-weight="700">100</text>
  <text x="280" y="300" font-size="13" fill="#8A5E12" text-anchor="middle" font-weight="700">100</text>
  <text x="460" y="252" font-size="13" fill="#8A5E12" text-anchor="middle" font-weight="700">101</text>
  <circle cx="560" cy="258" r="4" fill="#C88A2E"/>
  <text x="560" y="252" font-size="13" fill="#8A5E12" text-anchor="middle" font-weight="700">101</text>
  <text x="730" y="232" font-size="13" fill="#8A5E12" text-anchor="middle" font-weight="700">102</text>

  <text x="215" y="322" font-size="11" fill="#8A9BA8" text-anchor="middle">조회만 → 그대로</text>
  <text x="490" y="322" font-size="11" fill="#8A9BA8" text-anchor="middle">커밋 → +1 ↑</text>

  <!-- MySQL note -->
  <rect x="60" y="352" width="740" height="60" rx="8" fill="#EAF4F6" stroke="#08748C" stroke-width="1.2"/>
  <text x="80" y="378" font-size="13" fill="#065A6E" font-weight="700">MySQL(InnoDB) 대응 개념 = trx_id (Transaction ID)</text>
  <text x="80" y="399" font-size="12" fill="#3E5060">쓰기 트랜잭션에만 할당됨 · 순수 읽기 전용 트랜잭션은 trx_id를 아예 안 받기도 함 → "읽기만으로는 안 움직인다"는 원리 동일</text>
</svg>
