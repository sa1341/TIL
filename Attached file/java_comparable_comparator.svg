<svg width="820" height="380" viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect x="0" y="0" width="820" height="380" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">Comparable vs Comparator</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">Comparable은 클래스에 "기본 정렬 기준"을 심는 것 · Comparator는 "그때그때 다른 기준"을 외부에서 제공하는 것</text>

  <!-- Comparable -->
  <rect x="40" y="92" width="360" height="256" rx="12" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="60" y="118" font-size="15" font-weight="700" fill="#065A6E">Comparable&lt;T&gt;</text>
  <text x="60" y="139" font-size="11" fill="#8A9BA8">기본(자연) 정렬 기준</text>
  <rect x="60" y="150" width="320" height="26" rx="4" fill="#ffffff" stroke="#B7D5DC"/><text x="72" y="168" font-size="10.5" fill="#3E5060">int compareTo(T o)</text>
  <text x="60" y="198" font-size="11.5" fill="#17212B">• <tspan font-weight="700">비교 대상 클래스 자신</tspan>이 구현</text>
  <text x="60" y="222" font-size="11.5" fill="#17212B">• 자기 자신(this)과 인자 o를 비교</text>
  <text x="60" y="246" font-size="11.5" fill="#17212B">• String·Integer·Date 등이 이미 구현</text>
  <text x="60" y="270" font-size="11.5" fill="#17212B">• Collections.sort(list) 로 바로 정렬</text>
  <text x="60" y="302" font-size="11" fill="#3E5060" font-weight="700">비유: "나는 이렇게 줄 서는 게 기본이야"</text>
  <text x="60" y="324" font-size="10.5" fill="#8A9BA8">한 클래스에 기준 하나 (내부 고정)</text>

  <!-- Comparator -->
  <rect x="420" y="92" width="360" height="256" rx="12" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="440" y="118" font-size="15" font-weight="700" fill="#8A5E12">Comparator&lt;T&gt;</text>
  <text x="440" y="139" font-size="11" fill="#8A9BA8">별도의(대체) 정렬 기준</text>
  <rect x="440" y="150" width="320" height="26" rx="4" fill="#ffffff" stroke="#E5DCC7"/><text x="452" y="168" font-size="10.5" fill="#3E5060">int compare(T a, T b)</text>
  <text x="440" y="198" font-size="11.5" fill="#17212B">• <tspan font-weight="700">외부에서 별도로</tspan> 정의해 전달</text>
  <text x="440" y="222" font-size="11.5" fill="#17212B">• 인자 a, b 두 개를 비교</text>
  <text x="440" y="246" font-size="11.5" fill="#17212B">• 이름순·나이순 등 여러 기준을 자유롭게</text>
  <text x="440" y="270" font-size="11.5" fill="#17212B">• sort(list, comparator) 로 기준 주입</text>
  <text x="440" y="302" font-size="11" fill="#3E5060" font-weight="700">비유: "이번엔 키 순으로 줄 서줘"</text>
  <text x="440" y="324" font-size="10.5" fill="#8A9BA8">기준 여러 개 (comparing/thenComparing 조합)</text>
</svg>
