<svg width="860" height="430" viewBox="0 0 860 430" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="biar" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8A9BA8"/></marker>
    <marker id="birand" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#B83227"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="430" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">B-Tree 인덱스 — 정렬된 색인으로 빠르게 찾기</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">루트→브랜치→리프로 범위를 좁혀 내려가고(수직 탐색), 리프에서 테이블로 랜덤 I/O 접근</text>

  <!-- root -->
  <rect x="360" y="88" width="140" height="40" rx="8" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="430" y="113" font-size="12" fill="#065A6E" text-anchor="middle" font-weight="700">루트 (Root)</text>

  <!-- branches -->
  <line x1="400" y1="128" x2="250" y2="158" stroke="#8A9BA8" stroke-width="1.4" marker-end="url(#biar)"/>
  <line x1="460" y1="128" x2="610" y2="158" stroke="#8A9BA8" stroke-width="1.4" marker-end="url(#biar)"/>
  <rect x="170" y="160" width="160" height="40" rx="8" fill="#EAF4F6" stroke="#08748C"/>
  <text x="250" y="185" font-size="11.5" fill="#065A6E" text-anchor="middle">브랜치 · ~ 100</text>
  <rect x="530" y="160" width="160" height="40" rx="8" fill="#EAF4F6" stroke="#08748C"/>
  <text x="610" y="185" font-size="11.5" fill="#065A6E" text-anchor="middle">브랜치 · 101 ~</text>

  <!-- leaves -->
  <line x1="210" y1="200" x2="130" y2="238" stroke="#8A9BA8" stroke-width="1.2" marker-end="url(#biar)"/>
  <line x1="290" y1="200" x2="330" y2="238" stroke="#8A9BA8" stroke-width="1.2" marker-end="url(#biar)"/>
  <line x1="570" y1="200" x2="530" y2="238" stroke="#8A9BA8" stroke-width="1.2" marker-end="url(#biar)"/>
  <line x1="650" y1="200" x2="730" y2="238" stroke="#8A9BA8" stroke-width="1.2" marker-end="url(#biar)"/>

  <!-- leaf nodes (sorted, linked) -->
  <rect x="70" y="240" width="120" height="40" rx="6" fill="#DFF0E8" stroke="#2E8B6B"/><text x="130" y="265" font-size="11" fill="#1F6B4E" text-anchor="middle">10·30·50</text>
  <rect x="272" y="240" width="120" height="40" rx="6" fill="#DFF0E8" stroke="#2E8B6B"/><text x="332" y="265" font-size="11" fill="#1F6B4E" text-anchor="middle">60·80·100</text>
  <rect x="470" y="240" width="120" height="40" rx="6" fill="#DFF0E8" stroke="#2E8B6B"/><text x="530" y="265" font-size="11" fill="#1F6B4E" text-anchor="middle">110·130·150</text>
  <rect x="672" y="240" width="120" height="40" rx="6" fill="#DFF0E8" stroke="#2E8B6B"/><text x="732" y="265" font-size="11" fill="#1F6B4E" text-anchor="middle">160·180·200</text>
  <!-- leaf link (sorted chain) -->
  <line x1="190" y1="260" x2="272" y2="260" stroke="#2E8B6B" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#biar)"/>
  <line x1="392" y1="260" x2="470" y2="260" stroke="#2E8B6B" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#biar)"/>
  <line x1="590" y1="260" x2="672" y2="260" stroke="#2E8B6B" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#biar)"/>
  <text x="430" y="300" font-size="10.5" fill="#2E8B6B" text-anchor="middle">리프 노드는 정렬된 채 서로 연결됨 → 범위 검색에 유리</text>

  <!-- table -->
  <rect x="272" y="332" width="240" height="70" rx="8" fill="#FCF5F4" stroke="#B83227" stroke-width="1.4"/>
  <text x="392" y="354" font-size="12" font-weight="700" fill="#B83227" text-anchor="middle">테이블 (실제 행)</text>
  <text x="392" y="374" font-size="10.5" fill="#8A9BA8" text-anchor="middle">리프의 ROWID로 행에 접근</text>
  <text x="392" y="391" font-size="10.5" fill="#8A9BA8" text-anchor="middle">흩어져 있어 랜덤 I/O 발생</text>
  <line x1="332" y1="280" x2="360" y2="332" stroke="#B83227" stroke-width="1.4" marker-end="url(#birand)"/>
  <text x="180" y="360" font-size="11" fill="#B83227">랜덤 I/O 최소화가</text>
  <text x="180" y="378" font-size="11" fill="#B83227">튜닝의 핵심</text>
</svg>
