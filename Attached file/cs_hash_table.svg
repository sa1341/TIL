<svg width="860" height="400" viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="htar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
    <marker id="htcol" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#B83227"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">해시 테이블 — 해시 함수로 인덱스를 구해 바로 접근</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">key → 해시 함수 → (해시값 % 배열크기) → 인덱스 → 그 자리에 저장/조회 (평균 O(1)) · 같은 인덱스면 충돌</text>

  <!-- keys -->
  <rect x="40" y="110" width="120" height="30" rx="6" fill="#FBF3E4" stroke="#C88A2E"/><text x="100" y="130" font-size="11.5" fill="#8A5E12" text-anchor="middle">key "apple"</text>
  <rect x="40" y="200" width="120" height="30" rx="6" fill="#FBF3E4" stroke="#C88A2E"/><text x="100" y="220" font-size="11.5" fill="#8A5E12" text-anchor="middle">key "grape"</text>
  <rect x="40" y="290" width="120" height="30" rx="6" fill="#FBF3E4" stroke="#C88A2E"/><text x="100" y="310" font-size="11.5" fill="#8A5E12" text-anchor="middle">key "melon"</text>

  <!-- hash function -->
  <rect x="220" y="150" width="150" height="130" rx="10" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="295" y="205" font-size="12.5" font-weight="700" fill="#065A6E" text-anchor="middle">해시 함수</text>
  <text x="295" y="228" font-size="10.5" fill="#8A9BA8" text-anchor="middle">hash(key) % N</text>
  <line x1="160" y1="125" x2="218" y2="180" stroke="#08748C" stroke-width="1.4" marker-end="url(#htar)"/>
  <line x1="160" y1="215" x2="218" y2="215" stroke="#08748C" stroke-width="1.4" marker-end="url(#htar)"/>
  <line x1="160" y1="305" x2="218" y2="250" stroke="#08748C" stroke-width="1.4" marker-end="url(#htar)"/>

  <!-- array -->
  <text x="470" y="102" font-size="12" font-weight="700" fill="#3E5060">버킷 배열 (index)</text>
  <g font-size="11">
    <rect x="470" y="110" width="180" height="28" fill="#ffffff" stroke="#B7D5DC"/><text x="484" y="129" fill="#8A9BA8">0</text>
    <rect x="470" y="138" width="180" height="28" fill="#DFF0E8" stroke="#2E8B6B"/><text x="484" y="157" fill="#8A9BA8">1</text><text x="560" y="157" fill="#1F6B4E" text-anchor="middle">apple</text>
    <rect x="470" y="166" width="180" height="28" fill="#ffffff" stroke="#B7D5DC"/><text x="484" y="185" fill="#8A9BA8">2</text>
    <rect x="470" y="194" width="180" height="28" fill="#DFF0E8" stroke="#2E8B6B"/><text x="484" y="213" fill="#8A9BA8">3</text><text x="545" y="213" fill="#1F6B4E" text-anchor="middle">grape</text>
    <rect x="470" y="222" width="180" height="28" fill="#ffffff" stroke="#B7D5DC"/><text x="484" y="241" fill="#8A9BA8">4</text>
  </g>
  <line x1="370" y1="200" x2="468" y2="152" stroke="#08748C" stroke-width="1.4" marker-end="url(#htar)"/>
  <line x1="370" y1="215" x2="468" y2="208" stroke="#08748C" stroke-width="1.4" marker-end="url(#htar)"/>

  <!-- collision -->
  <line x1="370" y1="230" x2="468" y2="208" stroke="#B83227" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#htcol)"/>
  <rect x="680" y="194" width="150" height="28" rx="4" fill="#FCF5F4" stroke="#B83227"/><text x="755" y="213" font-size="11" fill="#B83227" text-anchor="middle">melon (충돌!)</text>
  <line x1="650" y1="208" x2="678" y2="208" stroke="#B83227" stroke-width="1.4" marker-end="url(#htcol)"/>
  <text x="755" y="240" font-size="10" fill="#B83227" text-anchor="middle">같은 인덱스 3 → List로 연결(체이닝)</text>

  <text x="40" y="360" font-size="11.5" fill="#8A9BA8">충돌이 많아지면 한 버킷에 여러 개가 몰려 탐색이 느려짐 → 좋은 해시 함수로 충돌을 최소화하는 것이 중요.</text>
  <text x="40" y="380" font-size="11.5" fill="#8A9BA8">(자바 HashMap은 한 버킷의 충돌이 많아지면 링크드리스트를 트리로 전환해 성능 저하를 완화한다.)</text>
</svg>
