<svg width="860" height="440" viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect x="0" y="0" width="860" height="440" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">트랜잭션 격리 수준 × 발생 가능한 이상 현상</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">아래로 갈수록 고립 정도가 높아지고 이상 현상이 줄지만, 동시 처리 성능은 떨어진다.</text>

  <!-- column headers -->
  <rect x="40" y="90" width="230" height="44" fill="#F4F6F8" stroke="#C7D2DA"/>
  <text x="155" y="118" font-size="12.5" font-weight="700" fill="#3E5060" text-anchor="middle">격리 수준</text>
  <rect x="270" y="90" width="180" height="44" fill="#F4F6F8" stroke="#C7D2DA"/>
  <text x="360" y="112" font-size="12" font-weight="700" fill="#3E5060" text-anchor="middle">Dirty Read</text>
  <text x="360" y="128" font-size="10" fill="#8A9BA8" text-anchor="middle">미커밋 데이터 조회</text>
  <rect x="450" y="90" width="185" height="44" fill="#F4F6F8" stroke="#C7D2DA"/>
  <text x="542" y="112" font-size="12" font-weight="700" fill="#3E5060" text-anchor="middle">Non-Repeatable</text>
  <text x="542" y="128" font-size="10" fill="#8A9BA8" text-anchor="middle">재조회 시 값 변경</text>
  <rect x="635" y="90" width="185" height="44" fill="#F4F6F8" stroke="#C7D2DA"/>
  <text x="727" y="112" font-size="12" font-weight="700" fill="#3E5060" text-anchor="middle">Phantom Read</text>
  <text x="727" y="128" font-size="10" fill="#8A9BA8" text-anchor="middle">재조회 시 행 출현</text>

  <!-- row 1: READ UNCOMMITTED -->
  <rect x="40" y="134" width="230" height="60" fill="#FCF5F4" stroke="#C7D2DA"/>
  <text x="56" y="160" font-size="12.5" font-weight="700" fill="#B83227">READ UNCOMMITTED</text>
  <text x="56" y="180" font-size="10" fill="#8A9BA8">표준에서 격리수준으로 미인정</text>
  <rect x="270" y="134" width="180" height="60" fill="#FCF5F4" stroke="#C7D2DA"/><text x="360" y="170" font-size="12" font-weight="700" fill="#B83227" text-anchor="middle">발생 O</text>
  <rect x="450" y="134" width="185" height="60" fill="#FCF5F4" stroke="#C7D2DA"/><text x="542" y="170" font-size="12" font-weight="700" fill="#B83227" text-anchor="middle">발생 O</text>
  <rect x="635" y="134" width="185" height="60" fill="#FCF5F4" stroke="#C7D2DA"/><text x="727" y="170" font-size="12" font-weight="700" fill="#B83227" text-anchor="middle">발생 O</text>

  <!-- row 2: READ COMMITTED -->
  <rect x="40" y="194" width="230" height="60" fill="#FBF3E4" stroke="#C7D2DA"/>
  <text x="56" y="220" font-size="12.5" font-weight="700" fill="#8A5E12">READ COMMITTED</text>
  <text x="56" y="240" font-size="10" fill="#8A9BA8">Oracle 기본 · 온라인 서비스 표준</text>
  <rect x="270" y="194" width="180" height="60" fill="#DFF0E8" stroke="#C7D2DA"/><text x="360" y="230" font-size="12" font-weight="700" fill="#1F6B4E" text-anchor="middle">방지 X</text>
  <rect x="450" y="194" width="185" height="60" fill="#FCF5F4" stroke="#C7D2DA"/><text x="542" y="230" font-size="12" font-weight="700" fill="#B83227" text-anchor="middle">발생 O</text>
  <rect x="635" y="194" width="185" height="60" fill="#FCF5F4" stroke="#C7D2DA"/><text x="727" y="230" font-size="12" font-weight="700" fill="#B83227" text-anchor="middle">발생 O</text>

  <!-- row 3: REPEATABLE READ -->
  <rect x="40" y="254" width="230" height="60" fill="#EAF4F6" stroke="#C7D2DA"/>
  <text x="56" y="280" font-size="12.5" font-weight="700" fill="#065A6E">REPEATABLE READ</text>
  <text x="56" y="300" font-size="10" fill="#8A9BA8">MySQL(InnoDB) 기본 · MVCC</text>
  <rect x="270" y="254" width="180" height="60" fill="#DFF0E8" stroke="#C7D2DA"/><text x="360" y="290" font-size="12" font-weight="700" fill="#1F6B4E" text-anchor="middle">방지 X</text>
  <rect x="450" y="254" width="185" height="60" fill="#DFF0E8" stroke="#C7D2DA"/><text x="542" y="290" font-size="12" font-weight="700" fill="#1F6B4E" text-anchor="middle">방지 X</text>
  <rect x="635" y="254" width="185" height="60" fill="#FBF3E4" stroke="#C7D2DA"/><text x="727" y="284" font-size="12" font-weight="700" fill="#8A5E12" text-anchor="middle">발생 △</text>
  <text x="727" y="302" font-size="9.5" fill="#8A9BA8" text-anchor="middle">INSERT 시 (표준상)</text>

  <!-- row 4: SERIALIZABLE -->
  <rect x="40" y="314" width="230" height="60" fill="#DFF0E8" stroke="#C7D2DA"/>
  <text x="56" y="340" font-size="12.5" font-weight="700" fill="#1F6B4E">SERIALIZABLE</text>
  <text x="56" y="360" font-size="10" fill="#8A9BA8">가장 엄격 · 읽기에도 공유 잠금</text>
  <rect x="270" y="314" width="180" height="60" fill="#DFF0E8" stroke="#C7D2DA"/><text x="360" y="350" font-size="12" font-weight="700" fill="#1F6B4E" text-anchor="middle">방지 X</text>
  <rect x="450" y="314" width="185" height="60" fill="#DFF0E8" stroke="#C7D2DA"/><text x="542" y="350" font-size="12" font-weight="700" fill="#1F6B4E" text-anchor="middle">방지 X</text>
  <rect x="635" y="314" width="185" height="60" fill="#DFF0E8" stroke="#C7D2DA"/><text x="727" y="350" font-size="12" font-weight="700" fill="#1F6B4E" text-anchor="middle">방지 X</text>

  <text x="40" y="404" font-size="11.5" fill="#8A9BA8">· MySQL InnoDB의 REPEATABLE READ는 갭 락(Next-Key Lock)으로 표준과 달리 Phantom Read까지 대부분 방지한다.</text>
  <text x="40" y="424" font-size="11.5" fill="#8A9BA8">· "발생 O"는 해당 이상 현상이 나타날 수 있음, "방지 X"는 방지됨(발생하지 않음)을 뜻한다.</text>
</svg>
