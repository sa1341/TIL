<svg viewBox="0 0 860 450" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="ecar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
    <marker id="eccl" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#B83227"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="450" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">실행 컨텍스트 · 스코프 체인 · 클로저</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">함수 호출마다 실행 컨텍스트가 콜스택에 쌓임 · 각자 [[scope]]로 스코프 체인 참조 · 클로저는 바깥 변수 객체를 살려둠</text>

  <!-- Call stack -->
  <text x="60" y="94" font-size="13" font-weight="700" fill="#3E5060">콜 스택 (Call Stack)</text>
  <rect x="60" y="104" width="320" height="60" rx="8" fill="#FCF5F4" stroke="#B83227" stroke-width="1.4"/>
  <text x="74" y="126" font-size="12" font-weight="700" fill="#B83227">innerFunc 실행 컨텍스트 (최상단)</text>
  <text x="74" y="146" font-size="10.5" fill="#8A9BA8">변수 객체 · this · 스코프 체인</text>
  <rect x="60" y="172" width="320" height="56" rx="8" fill="#EAF4F6" stroke="#08748C"/>
  <text x="74" y="194" font-size="12" font-weight="700" fill="#065A6E">outerFunc 실행 컨텍스트</text>
  <text x="74" y="213" font-size="10.5" fill="#8A9BA8">지역 변수 local 을 가진 변수 객체</text>
  <rect x="60" y="236" width="320" height="56" rx="8" fill="#F4F6F7" stroke="#8A9BA8"/>
  <text x="74" y="258" font-size="12" font-weight="700" fill="#5A6B78">전역 실행 컨텍스트 (최하단)</text>
  <text x="74" y="277" font-size="10.5" fill="#8A9BA8">전역 객체</text>

  <!-- scope chain -->
  <text x="470" y="94" font-size="13" font-weight="700" fill="#3E5060">스코프 체인 ([[scope]])</text>
  <rect x="470" y="104" width="330" height="60" rx="8" fill="#ffffff" stroke="#B7D5DC"/>
  <text x="484" y="128" font-size="11.5" fill="#17212B">innerFunc의 [[scope]]</text>
  <text x="484" y="148" font-size="11" fill="#08748C">= [inner VO] → [outer VO] → [전역]</text>
  <line x1="380" y1="134" x2="468" y2="134" stroke="#08748C" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#ecar)"/>

  <rect x="470" y="176" width="330" height="48" rx="8" fill="#ffffff" stroke="#B7D5DC"/>
  <text x="484" y="205" font-size="11" fill="#3E5060">변수를 찾을 땐 체인을 따라 안 → 밖 순으로 탐색</text>

  <!-- closure -->
  <rect x="470" y="248" width="330" height="150" rx="10" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="490" y="272" font-size="13.5" font-weight="700" fill="#8A5E12">클로저 (Closure)</text>
  <text x="490" y="294" font-size="11" fill="#3E5060">outerFunc가 끝나 실행 컨텍스트는 콜스택에서</text>
  <text x="490" y="311" font-size="11" fill="#3E5060">사라져도, innerFunc의 [[scope]]가 여전히</text>
  <text x="490" y="328" font-size="11" fill="#3E5060">outer의 변수 객체를 참조하고 있어서…</text>
  <text x="490" y="352" font-size="11.5" fill="#8A5E12" font-weight="700">→ outer VO는 GC되지 않고 살아남는다</text>
  <text x="490" y="372" font-size="11.5" fill="#8A5E12" font-weight="700">→ innerFunc는 나중에도 local 에 접근 가능</text>
  <text x="490" y="390" font-size="10.5" fill="#8A9BA8">이것이 자바스크립트의 클로저</text>

  <!-- closure retention arrow -->
  <path d="M 220 228 Q 300 340 468 320" fill="none" stroke="#B83227" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#eccl)"/>
  <text x="250" y="330" font-size="10.5" fill="#B83227" font-weight="700">참조 유지</text>
</svg>
