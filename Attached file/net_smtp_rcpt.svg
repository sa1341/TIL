<svg width="860" height="340" viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="sar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#8A9BA8"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="340" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">SMTP RCPT TO — 도메인에 따라 갈리는 주소 검증</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">환경 차이가 아니라 "도메인 차이". 사내로만 테스트하다 외부 사용자에서 처음 터진다</text>

  <rect x="40" y="94" width="150" height="46" rx="10" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="115" y="122" font-size="12" font-weight="700" fill="#8A5E12" text-anchor="middle">RCPT TO</text>
  <line x1="190" y1="117" x2="250" y2="90" stroke="#8A9BA8" stroke-width="1.4" marker-end="url(#sar)"/>
  <line x1="190" y1="117" x2="250" y2="180" stroke="#8A9BA8" stroke-width="1.4" marker-end="url(#sar)"/>

  <!-- internal domain -->
  <rect x="255" y="70" width="565" height="46" rx="10" fill="#DFF0E8" stroke="#2E8B6B"/>
  <text x="275" y="90" font-size="11.5" font-weight="700" fill="#1F6B4E">사내 도메인 (MTA가 로컬 메일박스 직접 조회)</text>
  <text x="275" y="107" font-size="10.5" fill="#5A6B78">없는 주소면 즉시 550 → 개발에서 오류로 잡힘 (그러나 계정 열거에 취약)</text>

  <!-- external domain -->
  <rect x="255" y="158" width="565" height="60" rx="10" fill="#FCF5F4" stroke="#E0B4AD"/>
  <text x="275" y="180" font-size="11.5" font-weight="700" fill="#B83227">외부 도메인 (catch-all·지연 검증 서버)</text>
  <text x="275" y="198" font-size="10.5" fill="#5A6B78">존재 여부와 무관하게 250 OK → 실패는 나중에 바운스 메일로</text>
  <text x="275" y="213" font-size="10.5" fill="#8A9BA8">바운스 처리 코드 없으면 조용히 사라짐 (운영에서 오류 안 남)</text>

  <rect x="40" y="240" width="780" height="60" rx="10" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="56" y="262" font-size="12" font-weight="700" fill="#8A5E12">왜 250을 주나 — 보안 설계</text>
  <text x="56" y="283" font-size="11" fill="#5A6B78">즉시 550을 주면 공격자가 계정 존재 여부를 탐색(열거)할 수 있음 → 주소 목록이 새지 않게 막는 것.</text>

  <text x="32" y="326" font-size="11.5" fill="#8A9BA8">이메일 발송 성공은 SMTP 응답이 아니라 "바운스 처리"로 확인해야 한다.</text>
</svg>
