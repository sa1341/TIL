<svg width="820" height="410" viewBox="0 0 820 410" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="ddar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="820" height="410" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">도메인 서비스 — 여러 애그리거트에 걸친 로직</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">한 애그리거트로 표현하기 애매한 로직(예: 결제 금액 계산)은 특정 애그리거트에 억지로 넣지 말고 도메인 서비스로</text>

  <!-- domain service center -->
  <rect x="300" y="160" width="220" height="90" rx="12" fill="#FCF5F4" stroke="#B83227" stroke-width="1.8"/>
  <text x="410" y="192" font-size="14" font-weight="700" fill="#B83227" text-anchor="middle">도메인 서비스</text>
  <text x="410" y="214" font-size="11.5" fill="#3E5060" text-anchor="middle">결제 금액 계산</text>
  <text x="410" y="232" font-size="10" fill="#8A9BA8" text-anchor="middle">calculatePayAmount(...)</text>

  <!-- aggregates -->
  <rect x="60" y="110" width="180" height="56" rx="10" fill="#EAF4F6" stroke="#08748C"/>
  <text x="150" y="134" font-size="12.5" font-weight="700" fill="#065A6E" text-anchor="middle">상품 애그리거트</text>
  <text x="150" y="152" font-size="9.5" fill="#8A9BA8" text-anchor="middle">가격 · 배송비</text>

  <rect x="60" y="244" width="180" height="56" rx="10" fill="#EAF4F6" stroke="#08748C"/>
  <text x="150" y="268" font-size="12.5" font-weight="700" fill="#065A6E" text-anchor="middle">주문 애그리거트</text>
  <text x="150" y="286" font-size="9.5" fill="#8A9BA8" text-anchor="middle">상품별 구매 개수</text>

  <rect x="580" y="110" width="180" height="56" rx="10" fill="#EAF4F6" stroke="#08748C"/>
  <text x="670" y="134" font-size="12.5" font-weight="700" fill="#065A6E" text-anchor="middle">할인 쿠폰 애그리거트</text>
  <text x="670" y="152" font-size="9.5" fill="#8A9BA8" text-anchor="middle">할인 금액 · 비율 · 조건</text>

  <rect x="580" y="244" width="180" height="56" rx="10" fill="#EAF4F6" stroke="#08748C"/>
  <text x="670" y="268" font-size="12.5" font-weight="700" fill="#065A6E" text-anchor="middle">회원 애그리거트</text>
  <text x="670" y="286" font-size="9.5" fill="#8A9BA8" text-anchor="middle">등급별 추가 할인</text>

  <!-- arrows into service -->
  <line x1="240" y1="140" x2="298" y2="180" stroke="#08748C" stroke-width="1.4" marker-end="url(#ddar)"/>
  <line x1="240" y1="270" x2="298" y2="228" stroke="#08748C" stroke-width="1.4" marker-end="url(#ddar)"/>
  <line x1="580" y1="140" x2="522" y2="180" stroke="#08748C" stroke-width="1.4" marker-end="url(#ddar)"/>
  <line x1="580" y1="270" x2="522" y2="228" stroke="#08748C" stroke-width="1.4" marker-end="url(#ddar)"/>

  <text x="40" y="356" font-size="11.5" fill="#8A9BA8">이 계산 로직을 상품·주문·할인쿠폰 중 어디에 넣어도 어색하다 → 도메인 서비스가 여러 애그리거트를 조합해 계산.</text>
  <text x="40" y="378" font-size="11.5" fill="#8A9BA8">도메인 서비스는 상태 없이 로직만 가지며(무상태), 도메인 영역에 속한다(응용 서비스와 구분).</text>
</svg>
