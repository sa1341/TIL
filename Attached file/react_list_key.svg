<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="lkar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="820" height="380" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">배열 렌더링과 key — 항목을 식별해 효율적으로 갱신</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">배열을 map()으로 엘리먼트 리스트로 변환 · 각 항목의 고유 key로 리렌더 시 무엇이 바뀌었는지 정확히 매칭</text>

  <!-- data array -->
  <text x="120" y="100" font-size="12" font-weight="700" fill="#3E5060" text-anchor="middle">데이터 배열</text>
  <rect x="40" y="110" width="160" height="30" rx="5" fill="#FBF3E4" stroke="#C88A2E"/><text x="120" y="130" font-size="10.5" fill="#8A5E12" text-anchor="middle">{id:1, name:"A"}</text>
  <rect x="40" y="146" width="160" height="30" rx="5" fill="#FBF3E4" stroke="#C88A2E"/><text x="120" y="166" font-size="10.5" fill="#8A5E12" text-anchor="middle">{id:2, name:"B"}</text>
  <rect x="40" y="182" width="160" height="30" rx="5" fill="#FBF3E4" stroke="#C88A2E"/><text x="120" y="202" font-size="10.5" fill="#8A5E12" text-anchor="middle">{id:3, name:"C"}</text>

  <!-- map -->
  <line x1="200" y1="160" x2="270" y2="160" stroke="#08748C" stroke-width="1.6" marker-end="url(#lkar)"/>
  <text x="235" y="150" font-size="10.5" fill="#065A6E" text-anchor="middle" font-weight="700">.map()</text>
  <text x="235" y="178" font-size="9" fill="#8A9BA8" text-anchor="middle">key 부여</text>

  <!-- elements -->
  <text x="360" y="100" font-size="12" font-weight="700" fill="#3E5060" text-anchor="middle">엘리먼트 리스트</text>
  <rect x="275" y="110" width="170" height="30" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="360" y="130" font-size="10" fill="#065A6E" text-anchor="middle">&lt;Item key={1} /&gt;</text>
  <rect x="275" y="146" width="170" height="30" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="360" y="166" font-size="10" fill="#065A6E" text-anchor="middle">&lt;Item key={2} /&gt;</text>
  <rect x="275" y="182" width="170" height="30" rx="5" fill="#EAF4F6" stroke="#08748C"/><text x="360" y="202" font-size="10" fill="#065A6E" text-anchor="middle">&lt;Item key={3} /&gt;</text>

  <!-- reconcile -->
  <line x1="445" y1="160" x2="515" y2="160" stroke="#08748C" stroke-width="1.6" marker-end="url(#lkar)"/>
  <text x="480" y="150" font-size="9.5" fill="#8A9BA8" text-anchor="middle">리렌더</text>

  <rect x="520" y="104" width="280" height="120" rx="10" fill="#DFF0E8" stroke="#2E8B6B"/>
  <text x="660" y="128" font-size="12.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">재조정 (key로 매칭)</text>
  <text x="536" y="152" font-size="10.5" fill="#3E5060">B를 삭제해도 key로 A·C는 그대로 유지,</text>
  <text x="536" y="170" font-size="10.5" fill="#3E5060">B에 해당하는 항목만 제거</text>
  <text x="536" y="192" font-size="10.5" fill="#3E5060">순서가 바뀌어도 key로 같은 항목임을 인식</text>
  <text x="536" y="210" font-size="10.5" fill="#1F6B4E" font-weight="700">→ 최소한의 DOM 변경</text>

  <text x="40" y="270" font-size="12" font-weight="700" fill="#B83227">⚠ key로 배열 index를 쓰면 안 되는 이유</text>
  <text x="40" y="292" font-size="11" fill="#8A9BA8">항목을 추가·삭제·정렬하면 index가 밀려 다른 항목과 매칭이 어긋남 → 엉뚱한 항목이 갱신되거나 입력값이 섞임.</text>
  <text x="40" y="312" font-size="11" fill="#8A9BA8">그래서 각 데이터의 <tspan font-weight="700" fill="#3E5060">고유하고 안정적인 id</tspan>를 key로 써야 한다.</text>
</svg>
