<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect x="0" y="0" width="820" height="380" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">코틀린 가시성 지시자 — 접근 범위</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">private → protected → internal → public 순으로 접근 가능한 범위가 넓어진다 (public이 기본값)</text>

  <!-- widening bars -->
  <g font-size="11.5">
    <!-- private -->
    <rect x="40" y="96" width="180" height="40" rx="6" fill="#FCF5F4" stroke="#B83227"/>
    <text x="130" y="121" fill="#B83227" text-anchor="middle" font-weight="700">private</text>
    <text x="240" y="121" fill="#3E5060">선언된 곳(클래스/파일) 내부에서만</text>

    <!-- protected -->
    <rect x="40" y="150" width="300" height="40" rx="6" fill="#FBF3E4" stroke="#C88A2E"/>
    <text x="130" y="175" fill="#8A5E12" text-anchor="middle" font-weight="700">protected</text>
    <text x="360" y="175" fill="#3E5060">선언된 클래스 + 이를 상속한 하위 클래스</text>

    <!-- internal -->
    <rect x="40" y="204" width="440" height="40" rx="6" fill="#EAF4F6" stroke="#08748C"/>
    <text x="130" y="229" fill="#065A6E" text-anchor="middle" font-weight="700">internal</text>
    <text x="500" y="229" fill="#3E5060">같은 모듈(module) 안에서라면 어디서든</text>

    <!-- public -->
    <rect x="40" y="258" width="600" height="40" rx="6" fill="#DFF0E8" stroke="#2E8B6B"/>
    <text x="130" y="283" fill="#1F6B4E" text-anchor="middle" font-weight="700">public (기본값)</text>
    <text x="660" y="283" fill="#3E5060">어디서든 접근 가능</text>
  </g>

  <!-- scale arrow -->
  <line x1="40" y1="316" x2="640" y2="316" stroke="#8A9BA8" stroke-width="1.4"/>
  <text x="45" y="336" font-size="10.5" fill="#B83227">좁음 (강한 은닉)</text>
  <text x="560" y="336" font-size="10.5" fill="#2E8B6B">넓음 (완전 공개)</text>

  <text x="40" y="366" font-size="11" fill="#8A9BA8">캡슐화 원칙: 기본은 좁게(private) 두고, 꼭 필요한 것만 단계적으로 열어 준다. (자바의 default ≈ 코틀린 internal은 아님 — 자바는 패키지 단위, 코틀린은 모듈 단위)</text>
</svg>
