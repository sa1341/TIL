<svg width="860" height="440" viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="kar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="440" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">Kubernetes 프로브 — Startup · Liveness · Readiness</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">컨테이너 단위로 정의 · 프로세스 생존만으로는 부족하므로 애플리케이션에 특화된 상태 검사를 수행한다.</text>

  <!-- timeline -->
  <rect x="40" y="100" width="150" height="54" rx="10" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="115" y="124" font-size="13" font-weight="700" fill="#8A5E12" text-anchor="middle">컨테이너 시작</text>
  <text x="115" y="143" font-size="10" fill="#8A9BA8" text-anchor="middle">initialDelaySeconds</text>

  <line x1="190" y1="127" x2="234" y2="127" stroke="#08748C" stroke-width="1.6" marker-end="url(#kar)"/>

  <!-- Startup Probe -->
  <rect x="236" y="96" width="230" height="62" rx="10" fill="#EAF4F6" stroke="#08748C" stroke-width="1.8"/>
  <text x="351" y="120" font-size="13.5" font-weight="700" fill="#065A6E" text-anchor="middle">Startup Probe (시작)</text>
  <text x="351" y="139" font-size="10.5" fill="#5A6B78" text-anchor="middle">느리게 구동되는 컨테이너 보호</text>
  <text x="351" y="152" font-size="9.5" fill="#8A9BA8" text-anchor="middle">성공/초과까지 다른 프로브 대기</text>

  <line x1="466" y1="127" x2="510" y2="127" stroke="#08748C" stroke-width="1.6" marker-end="url(#kar)"/>
  <text x="488" y="118" font-size="10" fill="#8A9BA8" text-anchor="middle">성공</text>

  <!-- after startup: two ongoing probes -->
  <rect x="512" y="96" width="308" height="62" rx="10" fill="#ffffff" stroke="#B7D5DC"/>
  <text x="666" y="120" font-size="12" font-weight="700" fill="#3E5060" text-anchor="middle">이후 주기적으로 (periodSeconds)</text>
  <text x="666" y="140" font-size="10.5" fill="#8A9BA8" text-anchor="middle">Liveness · Readiness 프로브 반복 수행</text>

  <!-- Liveness -->
  <rect x="120" y="220" width="300" height="110" rx="12" fill="#FCF5F4" stroke="#B83227" stroke-width="1.8"/>
  <text x="270" y="248" font-size="14.5" font-weight="700" fill="#B83227" text-anchor="middle">Liveness Probe (활성)</text>
  <text x="270" y="272" font-size="11" fill="#5A6B78" text-anchor="middle">애플리케이션이 정상 동작 중인가?</text>
  <text x="270" y="292" font-size="11" fill="#5A6B78" text-anchor="middle">데드락 등으로 응답 불가 상태 감지</text>
  <rect x="140" y="300" width="260" height="22" rx="5" fill="#F6DFDC"/>
  <text x="270" y="315" font-size="10.5" font-weight="700" fill="#B83227" text-anchor="middle">실패 → 컨테이너 재시작 (restart)</text>

  <!-- Readiness -->
  <rect x="440" y="220" width="300" height="110" rx="12" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.8"/>
  <text x="590" y="248" font-size="14.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">Readiness Probe (준비)</text>
  <text x="590" y="272" font-size="11" fill="#5A6B78" text-anchor="middle">지금 요청을 받을 준비가 됐는가?</text>
  <text x="590" y="292" font-size="11" fill="#5A6B78" text-anchor="middle">일시적으로 트래픽만 차단 (재시작 X)</text>
  <rect x="460" y="300" width="260" height="22" rx="5" fill="#CDE9DC"/>
  <text x="590" y="315" font-size="10.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">실패 → 서비스 로드밸런서에서 제거</text>

  <text x="40" y="372" font-size="11.5" fill="#8A9BA8">· failureThreshold: 연속 실패 횟수가 이 값을 넘으면 실패로 간주 · timeoutSeconds: 응답 대기 한계.</text>
  <text x="40" y="394" font-size="11.5" fill="#8A9BA8">· Liveness는 "죽었으면 재시작", Readiness는 "아직/잠깐 안 되면 트래픽 제외"로 목적이 다르다.</text>
  <text x="40" y="416" font-size="11.5" fill="#8A9BA8">· HTTP 응답 코드가 200 이상 400 미만이면 성공으로 판정한다 (httpGet 프로브 기준).</text>
</svg>
