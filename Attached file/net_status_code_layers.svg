<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect x="0" y="0" width="860" height="320" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">200 OK인데 결제 실패 — 두 개의 레이어</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">HTTP 상태 = 전송/시스템의 결과. 비즈니스 성공 여부가 아니다</text>

  <rect x="40" y="94" width="380" height="86" rx="10" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="230" y="118" font-size="13" font-weight="700" fill="#065A6E" text-anchor="middle">HTTP 상태 코드 (전송·전달 단계)</text>
  <text x="230" y="140" font-size="11" fill="#5A6B78" text-anchor="middle">200 = "요청 잘 받고 잘 처리함"</text>
  <text x="230" y="162" font-size="10.5" fill="#8A9BA8" text-anchor="middle">인프라 장비(프록시·CDN·서킷브레이커)가 보는 값</text>

  <rect x="440" y="94" width="380" height="86" rx="10" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="630" y="118" font-size="13" font-weight="700" fill="#8A5E12" text-anchor="middle">비즈니스 코드 (응답 바디)</text>
  <text x="630" y="140" font-size="11" fill="#5A6B78" text-anchor="middle">"결제 실패 · 잔액 부족" 등 실제 결과</text>
  <text x="630" y="162" font-size="10.5" fill="#8A9BA8" text-anchor="middle">클라이언트가 반드시 확인해야 할 값</text>

  <rect x="40" y="200" width="780" height="52" rx="8" fill="#FCF5F4" stroke="#E0B4AD"/>
  <text x="56" y="222" font-size="12" font-weight="700" fill="#B83227">세분화의 함정 — 상태 코드를 4xx/5xx로 나눌수록 인프라가 간섭</text>
  <text x="56" y="242" font-size="11" fill="#5A6B78">잔액 부족(비즈니스 에러)을 5xx로 많이 내리면 서킷 브레이커가 서비스 자체를 끊을 수 있다.</text>

  <text x="32" y="284" font-size="11.5" fill="#8A9BA8">외부 API 연동 시 상태 코드를 절대 맹신하지 말고, 반드시 응답 바디의 비즈니스 코드까지 확인하라.</text>
</svg>
