<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="psar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
    <marker id="psar2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#C88A2E"/></marker>
  </defs>
  <rect x="0" y="0" width="820" height="380" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">Props vs State</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">Props는 부모가 자식에게 내려주는 읽기 전용 값 · State는 컴포넌트 내부의 변경 가능한 상태(setState로만 변경)</text>

  <!-- Props -->
  <rect x="40" y="92" width="360" height="150" rx="12" fill="#EAF4F6" stroke="#08748C" stroke-width="1.6"/>
  <text x="60" y="116" font-size="14" font-weight="700" fill="#065A6E">Props (읽기 전용)</text>
  <rect x="60" y="130" width="150" height="44" rx="8" fill="#ffffff" stroke="#B7D5DC"/><text x="135" y="157" font-size="11.5" fill="#17212B" text-anchor="middle">부모 컴포넌트</text>
  <line x1="210" y1="152" x2="256" y2="152" stroke="#08748C" stroke-width="1.6" marker-end="url(#psar)"/>
  <text x="233" y="144" font-size="9" fill="#8A9BA8" text-anchor="middle">props 전달</text>
  <rect x="260" y="130" width="120" height="44" rx="8" fill="#ffffff" stroke="#B7D5DC"/><text x="320" y="157" font-size="11.5" fill="#17212B" text-anchor="middle">자식 컴포넌트</text>
  <text x="60" y="200" font-size="11" fill="#3E5060">• 부모 → 자식 (단방향)</text>
  <text x="60" y="220" font-size="11" fill="#B83227" font-weight="700">• 자식은 props를 직접 수정 불가</text>

  <!-- State -->
  <rect x="420" y="92" width="360" height="150" rx="12" fill="#FBF3E4" stroke="#C88A2E" stroke-width="1.6"/>
  <text x="440" y="116" font-size="14" font-weight="700" fill="#8A5E12">State (변경 가능)</text>
  <rect x="440" y="130" width="320" height="44" rx="8" fill="#ffffff" stroke="#E5DCC7"/><text x="600" y="157" font-size="11.5" fill="#17212B" text-anchor="middle">컴포넌트 내부 상태 { number: 0 }</text>
  <text x="440" y="200" font-size="11" fill="#3E5060">• 컴포넌트가 스스로 소유·관리</text>
  <text x="440" y="220" font-size="11" fill="#B83227" font-weight="700">• 반드시 setState()로만 변경 (직접 대입 X)</text>

  <!-- setState cycle -->
  <rect x="40" y="264" width="740" height="90" rx="12" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.4"/>
  <text x="60" y="288" font-size="12.5" font-weight="700" fill="#1F6B4E">setState 리렌더 사이클</text>
  <rect x="60" y="300" width="150" height="36" rx="6" fill="#ffffff" stroke="#B7D5DC"/><text x="135" y="323" font-size="10.5" fill="#3E5060" text-anchor="middle">setState({...}) 호출</text>
  <line x1="210" y1="318" x2="256" y2="318" stroke="#C88A2E" stroke-width="1.6" marker-end="url(#psar2)"/>
  <rect x="260" y="300" width="150" height="36" rx="6" fill="#ffffff" stroke="#B7D5DC"/><text x="335" y="323" font-size="10.5" fill="#3E5060" text-anchor="middle">state 변경 감지</text>
  <line x1="410" y1="318" x2="456" y2="318" stroke="#C88A2E" stroke-width="1.6" marker-end="url(#psar2)"/>
  <rect x="460" y="300" width="150" height="36" rx="6" fill="#ffffff" stroke="#B7D5DC"/><text x="535" y="323" font-size="10.5" fill="#3E5060" text-anchor="middle">render() 재실행</text>
  <line x1="610" y1="318" x2="656" y2="318" stroke="#C88A2E" stroke-width="1.6" marker-end="url(#psar2)"/>
  <rect x="660" y="300" width="110" height="36" rx="6" fill="#ffffff" stroke="#B7D5DC"/><text x="715" y="323" font-size="10.5" fill="#3E5060" text-anchor="middle">화면 갱신</text>
</svg>
