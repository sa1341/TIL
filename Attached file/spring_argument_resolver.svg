<svg viewBox="0 0 840 360" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <marker id="arar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#08748C"/></marker>
  </defs>
  <rect x="0" y="0" width="840" height="360" fill="#ffffff"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#17212B">HandlerMethodArgumentResolver — 컨트롤러 인자 자동 주입</text>
  <text x="32" y="64" font-size="13.5" fill="#8A9BA8">요청에서 반복되는 값 추출(예: 세션의 로그인 유저)을 Resolver로 분리 → 컨트롤러 파라미터에 바로 주입</text>

  <!-- request -->
  <rect x="40" y="110" width="130" height="60" rx="10" fill="#FBF3E4" stroke="#C88A2E"/>
  <text x="105" y="136" font-size="12" font-weight="700" fill="#8A5E12" text-anchor="middle">HTTP 요청</text>
  <text x="105" y="155" font-size="10" fill="#8A9BA8" text-anchor="middle">세션·헤더·파라미터</text>
  <line x1="170" y1="140" x2="206" y2="140" stroke="#08748C" stroke-width="1.6" marker-end="url(#arar)"/>

  <!-- dispatcher -->
  <rect x="210" y="110" width="140" height="60" rx="10" fill="#EAF4F6" stroke="#08748C"/>
  <text x="280" y="136" font-size="12" font-weight="700" fill="#065A6E" text-anchor="middle">DispatcherServlet</text>
  <text x="280" y="155" font-size="10" fill="#8A9BA8" text-anchor="middle">핸들러 실행 전</text>
  <line x1="350" y1="140" x2="386" y2="140" stroke="#08748C" stroke-width="1.6" marker-end="url(#arar)"/>

  <!-- resolver -->
  <rect x="390" y="96" width="200" height="150" rx="12" fill="#FCF5F4" stroke="#B83227" stroke-width="1.6"/>
  <text x="490" y="120" font-size="12.5" font-weight="700" fill="#B83227" text-anchor="middle">ArgumentResolver</text>
  <rect x="408" y="132" width="164" height="46" rx="6" fill="#ffffff" stroke="#E3B5AE"/>
  <text x="490" y="151" font-size="10.5" fill="#3E5060" text-anchor="middle">① supportsParameter()</text>
  <text x="490" y="168" font-size="9.5" fill="#8A9BA8" text-anchor="middle">이 파라미터를 내가 처리? (예: @LoginUser)</text>
  <rect x="408" y="184" width="164" height="46" rx="6" fill="#ffffff" stroke="#E3B5AE"/>
  <text x="490" y="203" font-size="10.5" fill="#3E5060" text-anchor="middle">② resolveArgument()</text>
  <text x="490" y="220" font-size="9.5" fill="#8A9BA8" text-anchor="middle">요청에서 값 추출 → 객체로 변환</text>
  <line x1="590" y1="150" x2="626" y2="150" stroke="#08748C" stroke-width="1.6" marker-end="url(#arar)"/>

  <!-- controller -->
  <rect x="630" y="110" width="180" height="90" rx="12" fill="#DFF0E8" stroke="#2E8B6B" stroke-width="1.6"/>
  <text x="720" y="134" font-size="12.5" font-weight="700" fill="#1F6B4E" text-anchor="middle">컨트롤러 메서드</text>
  <rect x="646" y="146" width="148" height="40" rx="6" fill="#ffffff" stroke="#B7D5DC"/>
  <text x="720" y="163" font-size="9.5" fill="#3E5060" text-anchor="middle">index(@LoginUser User u)</text>
  <text x="720" y="178" font-size="9" fill="#8A9BA8" text-anchor="middle">u 가 이미 채워진 상태로 호출</text>

  <text x="40" y="286" font-size="12" font-weight="700" fill="#3E5060">효과</text>
  <text x="40" y="308" font-size="11.5" fill="#8A9BA8">모든 컨트롤러에서 반복하던 "세션에서 유저 꺼내기" 코드를 Resolver 한 곳으로 모음 → 컨트롤러는 깔끔해지고 중복 제거.</text>
  <text x="40" y="330" font-size="11.5" fill="#8A9BA8">WebMvcConfigurer의 addArgumentResolvers()에 등록해서 사용한다.</text>
</svg>
